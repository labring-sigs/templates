name: build-template-cluster-image
on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - "template/**"
  pull_request:
    paths:
      - "template/**"
jobs:
  gen-targets:
    runs-on: ubuntu-latest
    outputs:
      targets: ${{ steps.targets.outputs.targets }}
      matrix: ${{ steps.targets.outputs.matrix }}
      has_targets: ${{ steps.targets.outputs.has_targets }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Validate platform metadata
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          supported_arches = {"amd64", "arm64"}
          errors = []

          indexes = sorted(Path("template").glob("*/index.yaml")) + sorted(Path("template").glob("*/index.yml"))
          for index in indexes:
              platform_file = index.parent / "platform.json"
              if not platform_file.exists():
                  errors.append(f"{index.parent}: missing platform.json")
                  continue

              try:
                  platform = json.loads(platform_file.read_text(encoding="utf-8"))
              except json.JSONDecodeError as exc:
                  errors.append(f"{platform_file}: invalid JSON: {exc}")
                  continue

              architectures = platform.get("architectures")
              if not isinstance(architectures, list) or not architectures:
                  errors.append(f"{platform_file}: architectures must be a non-empty array")
                  continue

              invalid = [arch for arch in architectures if arch not in supported_arches]
              if invalid:
                  errors.append(f"{platform_file}: unsupported architectures: {', '.join(invalid)}")
              if len(set(architectures)) != len(architectures):
                  errors.append(f"{platform_file}: duplicate architectures")

              images_file = index.parent / "images.txt"
              if images_file.exists():
                  declared = set(architectures)
                  for line_number, raw_line in enumerate(images_file.read_text(encoding="utf-8").splitlines(), start=1):
                      line = raw_line.strip()
                      if not line or line.startswith("#"):
                          continue
                      parts = line.split()
                      if len(parts) == 1:
                          errors.append(f"{images_file}:{line_number}: image entries must declare architectures")
                      for arch in parts[1:]:
                          arch = arch.removeprefix("linux/")
                          if arch not in supported_arches:
                              errors.append(f"{images_file}:{line_number}: unsupported image arch {arch}")
                          elif arch not in declared:
                              errors.append(f"{images_file}:{line_number}: image arch {arch} is not declared in platform.json")

          if errors:
              raise SystemExit("\\n".join(errors))
          PY
      - name: Get all changed template files
        id: changed-files
        uses: tj-actions/changed-files@v47
        with:
          files: |
            template/**/index.yaml
            template/**/index.yml
            template/**/images.txt
          json: true
          escape_json: false
      - name: Resolve template targets
        id: targets
        env:
          CHANGED_FILES: ${{ steps.changed-files.outputs.all_changed_files }}
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          supported_arches = {"amd64", "arm64"}
          changed_files = json.loads(os.environ.get("CHANGED_FILES") or "[]")
          targets = []

          def architectures_for(target):
              platform_file = target.parent / "platform.json"
              platform = json.loads(platform_file.read_text(encoding="utf-8"))
              architectures = platform.get("architectures")
              if not isinstance(architectures, list) or not architectures:
                  raise SystemExit(f"{platform_file}: architectures must be a non-empty array")

              invalid = [arch for arch in architectures if arch not in supported_arches]
              if invalid:
                  raise SystemExit(f"{platform_file}: unsupported architectures: {', '.join(invalid)}")

              return architectures

          for changed_file in changed_files:
              path = Path(changed_file)
              if path.name in {"index.yaml", "index.yml"}:
                  target = path
              elif path.name == "images.txt":
                  index_yaml = path.parent / "index.yaml"
                  index_yml = path.parent / "index.yml"
                  if index_yaml.exists():
                      target = index_yaml
                  elif index_yml.exists():
                      target = index_yml
                  else:
                      raise SystemExit(f"images.txt has no sibling index.yaml or index.yml: {path}")
              else:
                  continue

              target_str = target.as_posix()
              if target_str not in targets:
                  targets.append(target_str)

          include = [
              {"target": target, "arch": arch}
              for target in targets
              for arch in architectures_for(Path(target))
          ]
          matrix = {"include": include}

          print(f"targets={json.dumps(targets)}")
          print(f"matrix={json.dumps(matrix)}")
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"targets={json.dumps(targets)}\n")
              output.write(f"matrix={json.dumps(matrix)}\n")
              output.write(f"has_targets={'true' if include else 'false'}\n")
          PY
      - name: List all changed template targets
        run: |
          echo '${{ steps.targets.outputs.targets }}'
          echo '${{ steps.targets.outputs.matrix }}'
  build:
    if: needs.gen-targets.outputs.has_targets == 'true'
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    permissions:
      contents: read
      packages: write
    needs: gen-targets
    strategy:
      matrix: ${{ fromJSON(needs.gen-targets.outputs.matrix) }}
      fail-fast: false
    steps:
      - name: Free Disk Space (Ubuntu)
        uses: BRAINSia/free-disk-space@v2
        with:
          # this might remove tools that are actually needed,
          # if set to "true" but frees about 6 GB
          tool-cache: false

          # all of these default to true, but feel free to set to
          # "false" if necessary for your workflow
          mandb: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up sealos
        run: |
          curl -sfL https://raw.githubusercontent.com/labring/sealos/main/scripts/install.sh | sh -s v5.1.0 labring/sealos
      - name: Build cluster image
        run: |
          if [[ $(basename ${{ matrix.target }}) == "index.yaml" || $(basename ${{ matrix.target }}) == "index.yml" ]]; then
            template_name=$(basename $(dirname ${{ matrix.target }}) | tr '[:upper:]' '[:lower:]')
          else
            template_name=$(basename ${{ matrix.target }} | tr '[:upper:]' '[:lower:]')
            template_name=${template_name%.yaml}
            template_name=${template_name%.yml}
          fi
          image_tag=latest-${{ matrix.arch }}
          sudo bash scripts/build-cluster-image.sh ${{ matrix.target }} ghcr.io/${{ github.repository }}/sealos-cloud-template-$template_name:$image_tag ${{ matrix.arch }}
      #https://github.com/labring/sealos/issues/6112
      - name: Login to ghcr.io
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          sudo sealos logout docker.io || true
          sudo sealos login -u ${{ github.repository_owner }} -p ${{ secrets.GITHUB_TOKEN }} ghcr.io
      - name: Push and save cluster image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          if [[ $(basename ${{ matrix.target }}) == "index.yaml" || $(basename ${{ matrix.target }}) == "index.yml" ]]; then
            template_name=$(basename $(dirname ${{ matrix.target }}) | tr '[:upper:]' '[:lower:]')
          else
            template_name=$(basename ${{ matrix.target }} | tr '[:upper:]' '[:lower:]')
            template_name=${template_name%.yaml}
            template_name=${template_name%.yml}
          fi
          image_tag=latest-${{ matrix.arch }}
          sudo sealos push ghcr.io/${{ github.repository }}/sealos-cloud-template-$template_name:$image_tag
          sudo sealos save ghcr.io/${{ github.repository }}/sealos-cloud-template-$template_name:$image_tag -o $template_name.tar
      - name: Upload cluster image tar
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && github.repository_owner == 'labring-sigs'
        run: |
          sudo -v ; curl https://gosspublic.alicdn.com/ossutil/install.sh | sudo bash
          if [[ $(basename ${{ matrix.target }}) == "index.yaml" || $(basename ${{ matrix.target }}) == "index.yml" ]]; then
            template_name=$(basename $(dirname ${{ matrix.target }}) | tr '[:upper:]' '[:lower:]')
          else
            template_name=$(basename ${{ matrix.target }} | tr '[:upper:]' '[:lower:]')
            template_name=${template_name%.yaml}
            template_name=${template_name%.yml}
          fi
          upload_dir="offline/template"
          if [[ "${{ matrix.arch }}" == "arm64" ]]; then
            upload_dir="offline/template/arm64"
          fi
          ossutil64 cp -f -e ${{ secrets.OSS_ENDPOINT }} \
            -i ${{ secrets.OSS_ACCESS_KEY_ID }} \
            -k ${{ secrets.OSS_ACCESS_KEY_SECRET }} \
            $template_name.tar \
            oss://${{ secrets.OSS_BUCKET }}/$upload_dir/$template_name.tar
