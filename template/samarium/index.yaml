apiVersion: app.sealos.io/v1
kind: Template
metadata:
  name: samarium
spec:
  title: Samarium
  description: Samarium is an open-source Laravel ERP and CMS for inventory, sales, purchases, accounting, pages, and customer operations.
  url: https://github.com/shyamsitaula/samarium
  gitRepo: https://github.com/shyamsitaula/samarium
  author: Sealos
  readme: https://raw.githubusercontent.com/labring-sigs/templates/main/template/samarium/README.md
  icon: https://raw.githubusercontent.com/labring-sigs/templates/main/template/samarium/logo.png
  screenshots:
    - https://raw.githubusercontent.com/labring-sigs/templates/main/template/samarium/website-screenshot.webp
  templateType: inline
  locale: en
  i18n:
    zh:
      description: Samarium 是一个基于 Laravel 的开源 ERP 与 CMS，适用于库存、销售、采购、会计、内容页面和客户运营管理。
      readme: https://raw.githubusercontent.com/labring-sigs/templates/main/template/samarium/README_zh.md
  categories:
    - backend
  defaults:
    app_host:
      type: string
      value: samarium-${{ random(8) }}
    app_name:
      type: string
      value: samarium-${{ random(8) }}
    app_key:
      type: string
      value: ${{ random(32) }}
  inputs:
    ADMIN_NAME:
      description: Initial administrator display name for the Samarium dashboard.
      type: string
      default: Samarium Admin
      required: true
    ADMIN_EMAIL:
      description: Initial administrator email used to log in to Samarium.
      type: string
      default: admin@example.com
      required: true
    ADMIN_PASSWORD:
      description: Initial administrator password. Use at least 8 characters and save it before deployment.
      type: string
      default: ''
      required: true
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ${{ defaults.app_name }}-mysql
  labels:
    sealos-db-provider-cr: ${{ defaults.app_name }}-mysql
    app.kubernetes.io/instance: ${{ defaults.app_name }}-mysql
    app.kubernetes.io/managed-by: kbcli
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ${{ defaults.app_name }}-mysql
  labels:
    sealos-db-provider-cr: ${{ defaults.app_name }}-mysql
    app.kubernetes.io/instance: ${{ defaults.app_name }}-mysql
    app.kubernetes.io/managed-by: kbcli
rules:
  - apiGroups:
      - '*'
    resources:
      - '*'
    verbs:
      - '*'
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ${{ defaults.app_name }}-mysql
  labels:
    sealos-db-provider-cr: ${{ defaults.app_name }}-mysql
    app.kubernetes.io/instance: ${{ defaults.app_name }}-mysql
    app.kubernetes.io/managed-by: kbcli
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ${{ defaults.app_name }}-mysql
subjects:
  - kind: ServiceAccount
    name: ${{ defaults.app_name }}-mysql
---
apiVersion: apps.kubeblocks.io/v1alpha1
kind: Cluster
metadata:
  name: ${{ defaults.app_name }}-mysql
  labels:
    kb.io/database: ac-mysql-8.0.30-1
    clusterdefinition.kubeblocks.io/name: apecloud-mysql
    clusterversion.kubeblocks.io/name: ac-mysql-8.0.30-1
    sealos-db-provider-cr: ${{ defaults.app_name }}-mysql
spec:
  affinity:
    nodeLabels: {}
    podAntiAffinity: Preferred
    tenancy: SharedNode
    topologyKeys:
      - kubernetes.io/hostname
  clusterDefinitionRef: apecloud-mysql
  clusterVersionRef: ac-mysql-8.0.30-1
  componentSpecs:
    - name: mysql
      componentDefRef: mysql
      monitor: true
      noCreatePDB: false
      replicas: 1
      serviceAccountName: ${{ defaults.app_name }}-mysql
      switchPolicy:
        type: Noop
      resources:
        limits:
          cpu: 500m
          memory: 512Mi
        requests:
          cpu: 50m
          memory: 51Mi
      volumeClaimTemplates:
        - name: data
          spec:
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 1Gi
            storageClassName: openebs-backup
  terminationPolicy: Delete
  tolerations: []
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ${{ defaults.app_name }}
  annotations:
    originImageName: ghcr.io/yangchuansheng/samarium:0.0.0-9514fcadb867
    deploy.cloud.sealos.io/minReplicas: '1'
    deploy.cloud.sealos.io/maxReplicas: '1'
  labels:
    app: ${{ defaults.app_name }}
    cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}
spec:
  replicas: 1
  revisionHistoryLimit: 1
  minReadySeconds: 10
  serviceName: ${{ defaults.app_name }}
  selector:
    matchLabels:
      app: ${{ defaults.app_name }}
  template:
    metadata:
      labels:
        app: ${{ defaults.app_name }}
        cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      initContainers:
        - name: ${{ defaults.app_name }}-bootstrap
          image: ghcr.io/yangchuansheng/samarium:0.0.0-9514fcadb867
          imagePullPolicy: IfNotPresent
          env:
            - name: APP_NAME
              value: Samarium ERP
            - name: APP_ENV
              value: production
            - name: APP_DEBUG
              value: 'false'
            - name: APP_URL
              value: https://${{ defaults.app_host }}.${{ SEALOS_CLOUD_DOMAIN }}
            - name: ASSET_URL
              value: https://${{ defaults.app_host }}.${{ SEALOS_CLOUD_DOMAIN }}
            - name: APP_KEY
              value: ${{ defaults.app_key }}
            - name: LOG_CHANNEL
              value: stderr
            - name: DB_CONNECTION
              value: mysql
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: ${{ defaults.app_name }}-mysql-conn-credential
                  key: host
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: ${{ defaults.app_name }}-mysql-conn-credential
                  key: port
            - name: DB_DATABASE
              value: samarium
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: ${{ defaults.app_name }}-mysql-conn-credential
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ${{ defaults.app_name }}-mysql-conn-credential
                  key: password
            - name: CACHE_DRIVER
              value: file
            - name: SESSION_DRIVER
              value: file
            - name: QUEUE_CONNECTION
              value: sync
            - name: RUN_MIGRATIONS
              value: 'true'
            - name: RUN_SEEDERS
              value: 'false'
            - name: SITE_TYPE
              value: cms
            - name: CMP_TYPE
              value: cafe
            - name: ADMIN_NAME
              value: ${{ inputs.ADMIN_NAME }}
            - name: ADMIN_EMAIL
              value: ${{ inputs.ADMIN_EMAIL }}
            - name: ADMIN_PASSWORD
              value: ${{ inputs.ADMIN_PASSWORD }}
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              mkdir -p storage/app/public storage/framework/cache storage/framework/sessions storage/framework/views storage/logs bootstrap/cache
              chown -R www-data:www-data storage bootstrap/cache
              find storage bootstrap/cache -type d -exec chmod 775 {} \;
              find storage bootstrap/cache -type f -exec chmod 664 {} \;
              samarium-entrypoint true
              cat > app/Company.php <<'PHP'
              <?php namespace App; class Company extends \App\Models\Company\Company {}
              PHP
              php artisan tinker --execute='
              $now = now();
              $password = getenv("ADMIN_PASSWORD") ?: "Samarium@123456";
              $admin = App\Models\User\User::updateOrCreate(
                  ["email" => getenv("ADMIN_EMAIL") ?: "admin@example.com"],
                  [
                      "name" => getenv("ADMIN_NAME") ?: "Samarium Admin",
                      "password" => Illuminate\Support\Facades\Hash::make($password),
                      "role" => "admin",
                      "last_login_at" => $now,
                  ]
              );
              App\Models\Company\Company::firstOrCreate(
                  ["name" => "Demo Company"],
                  [
                      "tagline" => "Demo Company",
                      "phone" => "0000000 | 0000000000",
                      "email" => "info@example.com",
                      "address" => "Demo street, Demo city, Demo country",
                      "pan_number" => "000000000",
                      "brief_description" => "Demo Company helps you explore Samarium ERP and CMS features after first deployment.",
                      "fb_link" => "https://facebook.com",
                      "insta_link" => "https://instagram.com",
                      "logo_image_path" => "samarium-logo-1.png",
                  ]
              );
              App\Models\Cms\CmsTheme\CmsTheme::firstOrCreate(
                  ["name" => "Theme 1"],
                  [
                      "ascent_bg_color" => "#123",
                      "ascent_text_color" => "white",
                      "top_header_bg_color" => "white",
                      "top_header_text_color" => "#123",
                      "nav_menu_bg_color" => "#345",
                      "nav_menu_text_color" => "white",
                      "footer_bg_color" => "white",
                      "footer_text_color" => "#123",
                      "heading_color" => "#123",
                      "hero_image_path" => "samarium-logo-1.png",
                  ]
              );
              foreach ([
                  ["Home", "/home"],
                  ["About us", "/about-us"],
                  ["Products", "/products"],
                  ["Calendar", "/calendar"],
                  ["Noticeboard", "/noticeboard"],
                  ["Gallery", "/gallery"],
                  ["Contact us", "/contact-us"],
              ] as $page) {
                  App\Models\Cms\Webpage\Webpage::firstOrCreate(
                      ["name" => $page[0]],
                      ["permalink" => $page[1], "visibility" => "public", "creator_id" => $admin->id]
                  );
              }
              $menu = App\Models\Cms\CmsNavMenu\CmsNavMenu::firstOrCreate(["name" => "Nav menu 1"]);
              foreach (["About us", "Products", "Calendar", "Noticeboard", "Gallery", "Contact us"] as $idx => $name) {
                  $webpage = App\Models\Cms\Webpage\Webpage::where("name", $name)->first();
                  if ($webpage) {
                      App\Models\Cms\CmsNavMenu\CmsNavMenuItem::firstOrCreate(
                          ["cms_nav_menu_id" => $menu->cms_nav_menu_id, "name" => $name],
                          ["order" => $idx + 1, "type" => "item", "webpage_id" => $webpage->webpage_id]
                      );
                  }
              }
              Illuminate\Support\Facades\DB::table("webpage_category")->updateOrInsert(
                  ["name" => "Notice"],
                  ["created_at" => $now, "updated_at" => $now]
              );
              Illuminate\Support\Facades\DB::table("users")->where("email", getenv("ADMIN_EMAIL") ?: "admin@example.com")->update(["email_verified_at" => $now, "updated_at" => $now]);
              $logoSource = base_path("screenshots/samarium-logo-1.png");
              if (is_file($logoSource)) {
                  copy($logoSource, storage_path("app/public/samarium-logo-1.png"));
              }
              '
              php artisan route:clear >/dev/null 2>&1 || true
          resources:
            limits:
              cpu: 200m
              memory: 256Mi
            requests:
              cpu: 20m
              memory: 25Mi
          volumeMounts:
            - name: vn-varvn-wwwvn-htmlvn-storage
              mountPath: /var/www/html/storage
            - name: vn-varvn-wwwvn-htmlvn-bootstrapvn-cache
              mountPath: /var/www/html/bootstrap/cache
      containers:
        - name: ${{ defaults.app_name }}
          image: ghcr.io/yangchuansheng/samarium:0.0.0-9514fcadb867
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          env:
            - name: APP_NAME
              value: Samarium ERP
            - name: APP_ENV
              value: production
            - name: APP_DEBUG
              value: 'false'
            - name: APP_URL
              value: https://${{ defaults.app_host }}.${{ SEALOS_CLOUD_DOMAIN }}
            - name: ASSET_URL
              value: https://${{ defaults.app_host }}.${{ SEALOS_CLOUD_DOMAIN }}
            - name: APP_KEY
              value: ${{ defaults.app_key }}
            - name: LOG_CHANNEL
              value: stderr
            - name: DB_CONNECTION
              value: mysql
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: ${{ defaults.app_name }}-mysql-conn-credential
                  key: host
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: ${{ defaults.app_name }}-mysql-conn-credential
                  key: port
            - name: DB_DATABASE
              value: samarium
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: ${{ defaults.app_name }}-mysql-conn-credential
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ${{ defaults.app_name }}-mysql-conn-credential
                  key: password
            - name: CACHE_DRIVER
              value: file
            - name: SESSION_DRIVER
              value: file
            - name: QUEUE_CONNECTION
              value: sync
            - name: RUN_MIGRATIONS
              value: 'false'
            - name: RUN_SEEDERS
              value: 'false'
            - name: SITE_TYPE
              value: cms
            - name: CMP_TYPE
              value: cafe
          resources:
            limits:
              cpu: 100m
              memory: 128Mi
            requests:
              cpu: 10m
              memory: 12Mi
          startupProbe:
            httpGet:
              path: /login
              port: 80
            failureThreshold: 60
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /login
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /login
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              mkdir -p storage/app/public storage/framework/cache storage/framework/sessions storage/framework/views storage/logs bootstrap/cache
              chown -R www-data:www-data storage bootstrap/cache
              find storage bootstrap/cache -type d -exec chmod 775 {} \;
              find storage bootstrap/cache -type f -exec chmod 664 {} \;
              cat > app/Company.php <<'PHP'
              <?php namespace App; class Company extends \App\Models\Company\Company {}
              PHP
              php artisan storage:link --force >/dev/null 2>&1 || true
              php artisan config:cache >/dev/null 2>&1 || true
              php artisan route:clear >/dev/null 2>&1 || true
              php artisan view:cache >/dev/null 2>&1 || true
              exec apache2-foreground
          volumeMounts:
            - name: vn-varvn-wwwvn-htmlvn-storage
              mountPath: /var/www/html/storage
            - name: vn-varvn-wwwvn-htmlvn-bootstrapvn-cache
              mountPath: /var/www/html/bootstrap/cache
  volumeClaimTemplates:
    - metadata:
        name: vn-varvn-wwwvn-htmlvn-storage
        annotations:
          path: /var/www/html/storage
          value: '1'
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
    - metadata:
        name: vn-varvn-wwwvn-htmlvn-bootstrapvn-cache
        annotations:
          path: /var/www/html/bootstrap/cache
          value: '0.1'
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 103Mi
---
apiVersion: v1
kind: Service
metadata:
  name: ${{ defaults.app_name }}
  labels:
    app: ${{ defaults.app_name }}
    cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}
spec:
  ports:
    - name: tcp-80
      port: 80
      targetPort: 80
      protocol: TCP
  selector:
    app: ${{ defaults.app_name }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ${{ defaults.app_name }}
  labels:
    app: ${{ defaults.app_name }}
    cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}
    cloud.sealos.io/app-deploy-manager-domain: ${{ defaults.app_host }}
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: 32m
    nginx.ingress.kubernetes.io/server-snippet: |
      client_header_buffer_size 64k;
      large_client_header_buffers 4 128k;
    nginx.ingress.kubernetes.io/ssl-redirect: 'true'
    nginx.ingress.kubernetes.io/backend-protocol: HTTP
    nginx.ingress.kubernetes.io/client-body-buffer-size: 64k
    nginx.ingress.kubernetes.io/proxy-buffer-size: 64k
    nginx.ingress.kubernetes.io/proxy-send-timeout: '300'
    nginx.ingress.kubernetes.io/proxy-read-timeout: '300'
    nginx.ingress.kubernetes.io/configuration-snippet: |
      if ($request_uri ~* \.(js|css|gif|jpe?g|png)) {
        expires 30d;
        add_header Cache-Control "public";
      }
spec:
  rules:
    - host: ${{ defaults.app_host }}.${{ SEALOS_CLOUD_DOMAIN }}
      http:
        paths:
          - pathType: Prefix
            path: /
            backend:
              service:
                name: ${{ defaults.app_name }}
                port:
                  number: 80
  tls:
    - hosts:
        - ${{ defaults.app_host }}.${{ SEALOS_CLOUD_DOMAIN }}
      secretName: ${{ SEALOS_CERT_SECRET_NAME }}
---
apiVersion: app.sealos.io/v1
kind: App
metadata:
  name: ${{ defaults.app_name }}
  labels:
    cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}
spec:
  data:
    url: https://${{ defaults.app_host }}.${{ SEALOS_CLOUD_DOMAIN }}
  displayType: normal
  icon: https://raw.githubusercontent.com/labring-sigs/templates/main/template/samarium/logo.png
  name: Samarium
  type: link
