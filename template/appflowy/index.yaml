                  name: ${{ defaults.app_name }}-redis-conn-credential
                  key: password
            - name: APPFLOWY_WORKER_REDIS_URL
              value: redis://:$(REDIS_PASSWORD)@${{ defaults.app_name }}-redis-redis.${{ SEALOS_NAMESPACE }}.svc:6379
            - name: APPFLOWY_WORKER_IMPORT_TICK_INTERVAL
              value: '30'
            - name: APPFLOWY_MAILER_SMTP_HOST
              value: localhost
            - name: APPFLOWY_MAILER_SMTP_PORT
              value: '25'
            - name: APPFLOWY_MAILER_SMTP_USERNAME
              value: noreply@appflowy.local
            - name: APPFLOWY_MAILER_SMTP_EMAIL
              value: noreply@appflowy.local
            - name: APPFLOWY_MAILER_SMTP_PASSWORD
              value: unused
            - name: APPFLOWY_MAILER_SMTP_TLS_KIND
              value: none
${{ if(inputs.appflowy_s3_provider === 'sealos-objectstorage') }}
            - name: APPFLOWY_S3_USE_MINIO
              value: 'true'
            - name: APPFLOWY_S3_CREATE_BUCKET
              value: 'false'
            - name: APPFLOWY_S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: object-storage-key
                  key: accessKey
            - name: APPFLOWY_S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: object-storage-key
                  key: secretKey
            - name: APPFLOWY_S3_BUCKET
              valueFrom:
                secretKeyRef:
                  name: object-storage-key-${{ SEALOS_SERVICE_ACCOUNT }}-${{ defaults.app_name }}
                  key: bucket
            - name: APPFLOWY_S3_INTERNAL_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: object-storage-key
                  key: internal
            - name: APPFLOWY_S3_MINIO_URL
              value: http://$(APPFLOWY_S3_INTERNAL_ENDPOINT)
            - name: APPFLOWY_S3_REGION
              value: us-east-1
${{ endif() }}
${{ if(inputs.appflowy_s3_provider === 'external-s3') }}
            - name: APPFLOWY_S3_USE_MINIO
              value: 'true'
            - name: APPFLOWY_S3_CREATE_BUCKET
              value: 'false'
            - name: APPFLOWY_S3_ACCESS_KEY
              value: ${{ inputs.external_s3_access_key }}
            - name: APPFLOWY_S3_SECRET_KEY
              value: ${{ inputs.external_s3_secret_key }}
            - name: APPFLOWY_S3_BUCKET
              value: ${{ inputs.external_s3_bucket }}
            - name: APPFLOWY_S3_MINIO_URL
              value: ${{ inputs.external_s3_endpoint }}
            - name: APPFLOWY_S3_REGION
              value: ${{ inputs.external_s3_region }}
${{ endif() }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${{ defaults.app_name }}-web
  annotations:
    originImageName: appflowyinc/appflowy_web:0.14.9
    deploy.cloud.sealos.io/minReplicas: '1'
    deploy.cloud.sealos.io/maxReplicas: '1'
  labels:
    cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}-web
    app: ${{ defaults.app_name }}-web
spec:
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app: ${{ defaults.app_name }}-web
  template:
    metadata:
      labels:
        app: ${{ defaults.app_name }}-web
    spec:
      automountServiceAccountToken: false
      containers:
        - name: ${{ defaults.app_name }}-web
          image: appflowyinc/appflowy_web:0.14.9
          imagePullPolicy: IfNotPresent
          resources:
            limits:
              cpu: 100m
              memory: 128Mi
            requests:
              cpu: 10m
              memory: 12Mi
          ports:
            - containerPort: 80
              name: http
          env:
            - name: APPFLOWY_BASE_URL
              value: https://${{ defaults.app_host }}.${{ SEALOS_CLOUD_DOMAIN }}
            - name: APPFLOWY_GOTRUE_BASE_URL
              value: https://${{ defaults.auth_host }}.${{ SEALOS_CLOUD_DOMAIN }}
            - name: APPFLOWY_WS_BASE_URL
              value: wss://${{ defaults.app_host }}.${{ SEALOS_CLOUD_DOMAIN }}/ws/v2
          livenessProbe:
            httpGet:
              path: /app
              port: 80
            initialDelaySeconds: 20
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /app
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ${{ defaults.app_name }}-web
  labels:
    cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}-web
    app: ${{ defaults.app_name }}-web
spec:
  selector:
    app: ${{ defaults.app_name }}-web
  ports:
    - name: http
      port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ${{ defaults.app_name }}-web
  labels:
    cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}-web
    cloud.sealos.io/app-deploy-manager-domain: ${{ defaults.app_host }}
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: 32m
    nginx.ingress.kubernetes.io/server-snippet: |
      client_header_buffer_size 64k;
      large_client_header_buffers 4 128k;
    nginx.ingress.kubernetes.io/ssl-redirect: 'true'
    nginx.ingress.kubernetes.io/backend-protocol: HTTP
    nginx.ingress.kubernetes.io/client-body-buffer-size: 64k
    nginx.ingress.kubernetes.io/proxy-buffer-size: 64k
    nginx.ingress.kubernetes.io/proxy-send-timeout: '300'
    nginx.ingress.kubernetes.io/proxy-read-timeout: '300'
    nginx.ingress.kubernetes.io/configuration-snippet: |
      if ($request_uri ~* \.(js|css|gif|jpe?g|png)) {
        expires 30d;
        add_header Cache-Control "public";
      }
spec:
  rules:
    - host: ${{ defaults.app_host }}.${{ SEALOS_CLOUD_DOMAIN }}
      http:
        paths:
          - pathType: Prefix
            path: /
            backend:
              service:
                name: ${{ defaults.app_name }}-web
                port:
                  number: 80
  tls:
    - hosts:
        - ${{ defaults.app_host }}.${{ SEALOS_CLOUD_DOMAIN }}
      secretName: ${{ SEALOS_CERT_SECRET_NAME }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ${{ defaults.app_name }}-cloud
  labels:
    cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}-cloud
    cloud.sealos.io/app-deploy-manager-domain: ${{ defaults.app_host }}
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: 32m
    nginx.ingress.kubernetes.io/server-snippet: |
      client_header_buffer_size 64k;
      large_client_header_buffers 4 128k;
    nginx.ingress.kubernetes.io/ssl-redirect: 'true'
    nginx.ingress.kubernetes.io/backend-protocol: HTTP
    nginx.ingress.kubernetes.io/client-body-buffer-size: 64k
    nginx.ingress.kubernetes.io/proxy-buffer-size: 64k
    nginx.ingress.kubernetes.io/proxy-send-timeout: '300'
    nginx.ingress.kubernetes.io/proxy-read-timeout: '300'
    nginx.ingress.kubernetes.io/configuration-snippet: |
      if ($request_uri ~* \.(js|css|gif|jpe?g|png)) {
        expires 30d;
        add_header Cache-Control "public";
      }
spec:
  rules:
    - host: ${{ defaults.app_host }}.${{ SEALOS_CLOUD_DOMAIN }}
      http:
        paths:
          - pathType: Prefix
            path: /api
            backend:
              service:
                name: ${{ defaults.app_name }}-cloud
                port:
                  number: 8000
          - pathType: Prefix
            path: /ws
            backend:
              service:
                name: ${{ defaults.app_name }}-cloud
                port:
                  number: 8000
          - pathType: Prefix
            path: /ai
            backend:
              service:
                name: ${{ defaults.app_name }}-cloud
                port:
                  number: 8000
  tls:
    - hosts:
        - ${{ defaults.app_host }}.${{ SEALOS_CLOUD_DOMAIN }}
      secretName: ${{ SEALOS_CERT_SECRET_NAME }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ${{ defaults.app_name }}-gotrue
  labels:
    cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}-gotrue
    cloud.sealos.io/app-deploy-manager-domain: ${{ defaults.auth_host }}
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: 32m
    nginx.ingress.kubernetes.io/server-snippet: |
      client_header_buffer_size 64k;
      large_client_header_buffers 4 128k;
    nginx.ingress.kubernetes.io/ssl-redirect: 'true'
    nginx.ingress.kubernetes.io/backend-protocol: HTTP
    nginx.ingress.kubernetes.io/client-body-buffer-size: 64k
    nginx.ingress.kubernetes.io/proxy-buffer-size: 64k
    nginx.ingress.kubernetes.io/proxy-send-timeout: '300'
    nginx.ingress.kubernetes.io/proxy-read-timeout: '300'
    nginx.ingress.kubernetes.io/configuration-snippet: |
      if ($request_uri ~* \.(js|css|gif|jpe?g|png)) {
        expires 30d;
        add_header Cache-Control "public";
      }
spec:
  rules:
    - host: ${{ defaults.auth_host }}.${{ SEALOS_CLOUD_DOMAIN }}
      http:
        paths:
          - pathType: Prefix
            path: /
            backend:
              service:
                name: ${{ defaults.app_name }}-gotrue
                port:
                  number: 9999
  tls:
    - hosts:
        - ${{ defaults.auth_host }}.${{ SEALOS_CLOUD_DOMAIN }}
      secretName: ${{ SEALOS_CERT_SECRET_NAME }}
---
apiVersion: app.sealos.io/v1
kind: App
metadata:
  name: ${{ defaults.app_name }}
  labels:
    cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}
spec:
  data:
    url: https://${{ defaults.app_host }}.${{ SEALOS_CLOUD_DOMAIN }}
  displayType: normal
  icon: https://raw.githubusercontent.com/labring-sigs/templates/main/template/appflowy/logo.svg
  name: AppFlowy
  type: link
