apiVersion: app.sealos.io/v1
kind: Template
metadata:
  name: nexus
spec:
  title: 'Nexus'
  url: 'https://www.sonatype.com/products/sonatype-nexus-repository'
  gitRepo: 'GitHub - sonatype/docker-nexus: Docker image for Sonatype Nexus'
  author: '孤城落寞'
  description: 'A robust package registry built on extensive enterprise storage capabilities. This template deploys Nexus Repository OSS 2.'
  readme: 'https://raw.githubusercontent.com/sonatype/docker-nexus/master/README.md'
  icon: 'https://www.sonatype.com/hubfs/2-2023-Product%20Logos/Repo%20Nav%20Icon%20updated.png'
  templateType: inline
  locale: en
  i18n:
    zh:
      title: 'Nexus'
      description: '一个强大的软件仓库管理工具，主要用于存储和管理软件开发过程中的各类组件（artifacts）。此模板部署的是 Nexus Repository OSS 2。'
      readme: 'https://git.icloudnative.io/labring-actions/templates/main/template/nexus/README_cn.md'
  categories:
    - tool
  defaults:
    app_host:
      type: string
      value: ${{ random(8) }}
    app_name:
      type: string
      value: nexus-${{ random(8) }}
  inputs:
    nexus_storage:
      description: "Storage size for nexus in Gi"
      type: number
      default: "5"
      required: true

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ${{ defaults.app_name }}
  annotations:
    originImageName: sonatype/nexus:2.15.2-03
    deploy.cloud.sealos.io/minReplicas: '1'
    deploy.cloud.sealos.io/maxReplicas: '1'
  labels:
    cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}
    app: ${{ defaults.app_name }}
spec:
  replicas: 1
  revisionHistoryLimit: 1
  minReadySeconds: 10
  serviceName: ${{ defaults.app_name }}
  selector:
    matchLabels:
      app: ${{ defaults.app_name }}
  template:
    metadata:
      labels:
        app: ${{ defaults.app_name }}
    spec:
      terminationGracePeriodSeconds: 10
      automountServiceAccountToken: false
      initContainers:
        - name: take-data-dir-ownership
          image: alpine:3.22.2
          command:
            - /bin/sh
            - -c
            - chown -R 200:200 /sonatype-work
          imagePullPolicy: IfNotPresent
          volumeMounts:
            - name: vn-nexus-data
              mountPath: /sonatype-work
      containers:
        - name: ${{ defaults.app_name }}
          image: sonatype/nexus:2.15.2-03
          imagePullPolicy: IfNotPresent
          env:
            - name: TZ
              value: Asia/Shanghai
            - name: CONTEXT_PATH
              value: /
            - name: MIN_HEAP
              value: 512m
            - name: MAX_HEAP
              value: 1024m
            - name: JAVA_OPTS
              value: -server -Djava.net.preferIPv4Stack=true
          resources:
            requests:
              cpu: 500m
              memory: 1024Mi
            limits:
              cpu: 2000m
              memory: 2048Mi
          ports:
            - name: http
              containerPort: 8081
              protocol: TCP
          startupProbe:
            httpGet:
              path: /service/local/status
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /service/local/status
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /service/local/status
              port: http
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 6
          volumeMounts:
            - name: vn-nexus-data
              mountPath: /sonatype-work
  volumeClaimTemplates:
    - metadata:
        annotations:
          path: /sonatype-work
          value: "${{ inputs.nexus_storage }}"
        name: vn-nexus-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: ${{ inputs.nexus_storage }}Gi

---
apiVersion: v1
kind: Service
metadata:
  name: ${{ defaults.app_name }}
  labels:
    cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}
spec:
  ports:
    - name: http
      port: 8081
      targetPort: http
      protocol: TCP
  selector:
    app: ${{ defaults.app_name }}

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ${{ defaults.app_name }}
  labels:
    cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}
    cloud.sealos.io/app-deploy-manager-domain: ${{ defaults.app_host }}
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: 256m
    nginx.ingress.kubernetes.io/server-snippet: |
      client_header_buffer_size 64k;
      large_client_header_buffers 4 128k;
    nginx.ingress.kubernetes.io/ssl-redirect: 'false'
    nginx.ingress.kubernetes.io/backend-protocol: HTTP
    nginx.ingress.kubernetes.io/client-body-buffer-size: 64k
    nginx.ingress.kubernetes.io/proxy-buffer-size: 64k
    nginx.ingress.kubernetes.io/configuration-snippet: |
      if ($request_uri ~* \.(js|css|gif|jpe?g|png)) {
        expires 30d;
        add_header Cache-Control "public";
      }
spec:
  rules:
    - host: ${{ defaults.app_host }}.${{ SEALOS_CLOUD_DOMAIN }}
      http:
        paths:
          - pathType: Prefix
            path: /
            backend:
              service:
                name: ${{ defaults.app_name }}
                port:
                  number: 8081
  tls:
    - hosts:
        - ${{ defaults.app_host }}.${{ SEALOS_CLOUD_DOMAIN }}
      secretName: ${{ SEALOS_CERT_SECRET_NAME }}

---
apiVersion: app.sealos.io/v1
kind: App
metadata:
  name: ${{ defaults.app_name }}
  labels:
    cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}
spec:
  data:
    url: https://${{ defaults.app_host }}.${{ SEALOS_CLOUD_DOMAIN }}
  displayType: normal
  icon: "https://www.sonatype.com/hubfs/2-2023-Product%20Logos/Repo%20Nav%20Icon%20updated.png"
  name: Nexus
  type: link