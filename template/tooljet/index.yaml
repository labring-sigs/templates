apiVersion: apps.kubeblocks.io/v1alpha1
kind: Cluster
metadata:
  name: ${{ defaults.app_name }}-redis
  labels:
    clusterdefinition.kubeblocks.io/name: redis
    kb.io/database: redis-7.0.6
    app.kubernetes.io/instance: ${{ defaults.app_name }}-redis
    clusterversion.kubeblocks.io/name: redis-7.0.6
    sealos-db-provider-cr: ${{ defaults.app_name }}-redis
spec:
  affinity:
    nodeLabels: {}
    podAntiAffinity: Preferred
    tenancy: SharedNode
    topologyKeys: []
  clusterDefinitionRef: redis
  clusterVersionRef: redis-7.0.6
  componentSpecs:
    - componentDefRef: redis
      monitor: true
      name: redis
      replicas: 1
      serviceAccountName: ${{ defaults.app_name }}-redis
      switchPolicy:
        type: Noop
      resources:
        limits:
          cpu: 500m
          memory: 512Mi
        requests:
          cpu: 50m
          memory: 51Mi
      volumeClaimTemplates:
        - name: data
          spec:
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 1Gi
            storageClassName: openebs-backup
    - componentDefRef: redis-sentinel
      monitor: true
      name: redis-sentinel
      replicas: 1
      serviceAccountName: ${{ defaults.app_name }}-redis
      resources:
        limits:
          cpu: 100m
          memory: 100Mi
        requests:
          cpu: 100m
          memory: 100Mi
  terminationPolicy: Delete
  tolerations: []
---
apiVersion: batch/v1
kind: Job
metadata:
  name: ${{ defaults.app_name }}-pg-init
  labels:
    cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}-pg-init
    app: ${{ defaults.app_name }}-pg-init
spec:
  backoffLimit: 6
  template:
    spec:
      automountServiceAccountToken: false
      containers:
        - name: pgsql-init
          image: postgres:14.8-alpine
          imagePullPolicy: IfNotPresent
          env:
            - name: PG_HOST
              valueFrom:
                secretKeyRef:
                  name: ${{ defaults.app_name }}-pg-conn-credential
                  key: host
            - name: PG_PORT
              valueFrom:
                secretKeyRef:
                  name: ${{ defaults.app_name }}-pg-conn-credential
                  key: port
            - name: PG_USER
              valueFrom:
                secretKeyRef:
                  name: ${{ defaults.app_name }}-pg-conn-credential
                  key: username
            - name: PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ${{ defaults.app_name }}-pg-conn-credential
                  key: password
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              export PGPASSWORD="$PG_PASSWORD"
              for i in $(seq 1 90); do
                if pg_isready -h "$PG_HOST" -p "$PG_PORT" -U "$PG_USER" -d postgres >/dev/null 2>&1; then
                  break
                fi
                sleep 2
              done
              pg_isready -h "$PG_HOST" -p "$PG_PORT" -U "$PG_USER" -d postgres >/dev/null 2>&1
              if ! psql -h "$PG_HOST" -p "$PG_PORT" -U "$PG_USER" -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname='tooljet_production'" | grep -q 1; then
                psql -h "$PG_HOST" -p "$PG_PORT" -U "$PG_USER" -d postgres -v ON_ERROR_STOP=1 -c "CREATE DATABASE tooljet_production;"
              fi
              if ! psql -h "$PG_HOST" -p "$PG_PORT" -U "$PG_USER" -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname='tooljet_db'" | grep -q 1; then
                psql -h "$PG_HOST" -p "$PG_PORT" -U "$PG_USER" -d postgres -v ON_ERROR_STOP=1 -c "CREATE DATABASE tooljet_db;"
              fi
      restartPolicy: OnFailure
  ttlSecondsAfterFinished: 300
---
apiVersion: batch/v1
kind: Job
metadata:
  name: ${{ defaults.app_name }}-migrate
  labels:
    cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}-migrate
    app: ${{ defaults.app_name }}-migrate
spec:
  backoffLimit: 3
  template:
    spec:
      automountServiceAccountToken: false
      initContainers:
        - name: wait-for-postgres
          image: postgres:14.8-alpine
          imagePullPolicy: IfNotPresent
          env:
            - name: PG_HOST
              valueFrom:
                secretKeyRef:
                  name: ${{ defaults.app_name }}-pg-conn-credential
                  key: host
            - name: PG_PORT
              valueFrom:
                secretKeyRef:
                  name: ${{ defaults.app_name }}-pg-conn-credential
                  key: port
            - name: PG_USER
              valueFrom:
                secretKeyRef:
                  name: ${{ defaults.app_name }}-pg-conn-credential
                  key: username
            - name: PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ${{ defaults.app_name }}-pg-conn-credential
                  key: password
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              export PGPASSWORD="$PG_PASSWORD"
              for i in $(seq 1 180); do
                if pg_isready -h "$PG_HOST" -p "$PG_PORT" -U "$PG_USER" -d postgres >/dev/null 2>&1 \
                  && psql -h "$PG_HOST" -p "$PG_PORT" -U "$PG_USER" -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname='tooljet_production'" | grep -q 1 \
                  && psql -h "$PG_HOST" -p "$PG_PORT" -U "$PG_USER" -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname='tooljet_db'" | grep -q 1; then
                  exit 0
                fi
                sleep 2
              done
              echo "Timed out waiting for ToolJet databases" >&2
              exit 1
      containers:
        - name: tooljet-migrate
          image: ${{ inputs.tooljet_image }}
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              npm --prefix server run db:migrate:prod
          envFrom:
            - configMapRef:
                name: ${{ defaults.app_name }}
          env:
            - name: NODE_ENV
              value: production
            - name: TOOLJET_EDITION
              value: ce
            - name: TOOLJET_HOST
              value: https://${{ defaults.app_host }}.${{ SEALOS_CLOUD_DOMAIN }}
            - name: LOCKBOX_MASTER_KEY
              value: ${{ defaults.lockbox_master_key }}
            - name: SECRET_KEY_BASE
              value: ${{ defaults.secret_key_base }}
            - name: PG_HOST
              valueFrom:
                secretKeyRef:
                  name: ${{ defaults.app_name }}-pg-conn-credential
                  key: host
            - name: PG_PORT
              valueFrom:
                secretKeyRef:
                  name: ${{ defaults.app_name }}-pg-conn-credential
                  key: port
            - name: PG_USER
              valueFrom:
                secretKeyRef:
                  name: ${{ defaults.app_name }}-pg-conn-credential
                  key: username
            - name: PG_PASS
              valueFrom:
                secretKeyRef:
                  name: ${{ defaults.app_name }}-pg-conn-credential
                  key: password
            - name: PG_DB
              value: tooljet_production
            - name: TOOLJET_DB
              value: tooljet_db
            - name: TOOLJET_DB_HOST
              valueFrom:
                secretKeyRef:
                  name: ${{ defaults.app_name }}-pg-conn-credential
                  key: host
            - name: TOOLJET_DB_PORT
              valueFrom:
                secretKeyRef:
                  name: ${{ defaults.app_name }}-pg-conn-credential
                  key: port
            - name: TOOLJET_DB_USER
              valueFrom:
                secretKeyRef:
                  name: ${{ defaults.app_name }}-pg-conn-credential
                  key: username
            - name: TOOLJET_DB_PASS
              valueFrom:
                secretKeyRef:
                  name: ${{ defaults.app_name }}-pg-conn-credential
                  key: password
            - name: TOOLJET_DB_RECONFIG
              value: 'true'
            - name: REDIS_HOST
              value: ${{ defaults.app_name }}-redis-redis.${{ SEALOS_NAMESPACE }}.svc
            - name: REDIS_PORT
              valueFrom:
                secretKeyRef:
                  name: ${{ defaults.app_name }}-redis-conn-credential
                  key: port
            - name: REDIS_USERNAME
              valueFrom:
                secretKeyRef:
                  name: ${{ defaults.app_name }}-redis-conn-credential
                  key: username
            - name: REDIS_USER
              valueFrom:
                secretKeyRef:
                  name: ${{ defaults.app_name }}-redis-conn-credential
                  key: username
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ${{ defaults.app_name }}-redis-conn-credential
                  key: password
            - name: PGRST_JWT_SECRET
              value: ${{ defaults.pgrst_jwt_secret }}
            - name: PGRST_DB_PRE_CONFIG
              value: postgrest.pre_config
            - name: CHECK_FOR_UPDATES
              value: '0'
            - name: DISABLE_TOOLJET_TELEMETRY
              value: 'true'
            - name: DISABLE_CUSTOM_QUERY_LOGGING
              value: 'true'
            - name: SMTP_DISABLED
              value: 'true'
            - name: DEFAULT_FROM_EMAIL
              value: ${{ inputs.admin_email }}
            - name: ENABLE_MULTIPLAYER_EDITING
              value: 'true'
            - name: USER_SESSION_EXPIRY
              value: '2880'
            - name: DEPLOYMENT_PLATFORM
              value: k8s:sealos
          resources:
            limits:
              cpu: '1'
              memory: 2Gi
            requests:
              cpu: 50m
              memory: 512Mi
      restartPolicy: OnFailure
  ttlSecondsAfterFinished: 300
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${{ defaults.app_name }}-postgrest
  annotations:
    originImageName: postgrest/postgrest:v12.0.2
    deploy.cloud.sealos.io/minReplicas: '1'
    deploy.cloud.sealos.io/maxReplicas: '1'
  labels:
    cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}-postgrest
    app: ${{ defaults.app_name }}-postgrest
spec:
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app: ${{ defaults.app_name }}-postgrest
  template:
    metadata:
      labels:
        app: ${{ defaults.app_name }}-postgrest
    spec:
      automountServiceAccountToken: false
      containers:
        - name: ${{ defaults.app_name }}-postgrest
          image: postgrest/postgrest:v12.0.2
          imagePullPolicy: IfNotPresent
          env:
            - name: PG_HOST
              valueFrom:
                secretKeyRef:
                  name: ${{ defaults.app_name }}-pg-conn-credential
                  key: host
            - name: PG_PORT
              valueFrom:
                secretKeyRef:
                  name: ${{ defaults.app_name }}-pg-conn-credential
                  key: port
            - name: PG_USER
              valueFrom:
                secretKeyRef:
                  name: ${{ defaults.app_name }}-pg-conn-credential
                  key: username
            - name: PG_PASS
              valueFrom:
                secretKeyRef:
                  name: ${{ defaults.app_name }}-pg-conn-credential
                  key: password
            - name: PGRST_DB_URI
              value: host=$(PG_HOST) port=$(PG_PORT) dbname=tooljet_db user=$(PG_USER) password=$(PG_PASS)
            - name: PGRST_JWT_SECRET
              value: ${{ defaults.pgrst_jwt_secret }}
            - name: PGRST_DB_PRE_CONFIG
              value: postgrest.pre_config
            - name: PGRST_LOG_LEVEL
              value: info
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          resources:
            limits:
              cpu: 200m
              memory: 256Mi
            requests:
              cpu: 20m
              memory: 25Mi
---
apiVersion: v1
kind: Service
metadata:
  name: ${{ defaults.app_name }}-postgrest
  labels:
    app: ${{ defaults.app_name }}-postgrest
    cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}-postgrest
spec:
  ports:
    - name: http
      port: 3000
      targetPort: 3000
  selector:
    app: ${{ defaults.app_name }}-postgrest
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ${{ defaults.app_name }}
  labels:
    app: ${{ defaults.app_name }}
    cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}
data:
  PGRST_HOST: http://${{ defaults.app_name }}-postgrest.${{ SEALOS_NAMESPACE }}.svc:3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${{ defaults.app_name }}
  annotations:
    originImageName: ${{ inputs.tooljet_image }}
    deploy.cloud.sealos.io/minReplicas: '1'
    deploy.cloud.sealos.io/maxReplicas: '1'
    docker-to-sealos.resource-override-source: "Live Sealos cold-start validation on 2026-06-02: ToolJet v3.20.170-lts required 1536Mi memory for the main web process; lower 512Mi/768Mi attempts OOMKilled."
  labels:
    cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}
    app: ${{ defaults.app_name }}
spec:
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app: ${{ defaults.app_name }}
  template:
    metadata:
      labels:
        app: ${{ defaults.app_name }}
    spec:
      initContainers:
        - name: wait-for-tooljet-schema
          image: postgres:14.8-alpine
          imagePullPolicy: IfNotPresent
          env:
            - name: PG_HOST
              valueFrom:
                secretKeyRef:
                  name: ${{ defaults.app_name }}-pg-conn-credential
                  key: host
            - name: PG_PORT
              valueFrom:
                secretKeyRef:
                  name: ${{ defaults.app_name }}-pg-conn-credential
                  key: port
            - name: PG_USER
              valueFrom:
                secretKeyRef:
                  name: ${{ defaults.app_name }}-pg-conn-credential
                  key: username
            - name: PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ${{ defaults.app_name }}-pg-conn-credential
                  key: password
            - name: PG_DATABASE
              value: tooljet_production
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              export PGPASSWORD="$PG_PASSWORD"
              for i in $(seq 1 240); do
                if psql -h "$PG_HOST" -p "$PG_PORT" -U "$PG_USER" -d "$PG_DATABASE" -tAc "SELECT to_regclass('public.metadata') IS NOT NULL AND to_regclass('public.organizations') IS NOT NULL" | grep -q t; then
                  exit 0
                fi
                sleep 2
              done
              echo "Timed out waiting for ToolJet database schema" >&2
              exit 1
          resources:
            limits:
              cpu: 200m
              memory: 256Mi
            requests:
              cpu: 20m
              memory: 25Mi
      automountServiceAccountToken: false
      containers:
        - name: ${{ defaults.app_name }}
          image: ${{ inputs.tooljet_image }}
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - exec env PG_PORT=6432 npm run start:prod
          envFrom:
            - configMapRef:
                name: ${{ defaults.app_name }}
          env:
            - name: SERVE_CLIENT
              value: 'true'
            - name: PORT
              value: '3000'
            - name: NODE_ENV
              value: production
            - name: TOOLJET_EDITION
              value: ce
            - name: TOOLJET_HOST
              value: https://${{ defaults.app_host }}.${{ SEALOS_CLOUD_DOMAIN }}
            - name: LOCKBOX_MASTER_KEY
              value: ${{ defaults.lockbox_master_key }}
            - name: SECRET_KEY_BASE
              value: ${{ defaults.secret_key_base }}
            - name: PG_HOST
              valueFrom:
                secretKeyRef:
                  name: ${{ defaults.app_name }}-pg-conn-credential
                  key: host
            - name: PG_PORT
              valueFrom:
                secretKeyRef:
                  name: ${{ defaults.app_name }}-pg-conn-credential
                  key: port
            - name: PG_USER
              valueFrom:
                secretKeyRef:
                  name: ${{ defaults.app_name }}-pg-conn-credential
                  key: username
            - name: PG_PASS
              valueFrom:
                secretKeyRef:
                  name: ${{ defaults.app_name }}-pg-conn-credential
                  key: password
            - name: PG_DB
              value: tooljet_production
            - name: TOOLJET_DB
              value: tooljet_db
            - name: TOOLJET_DB_HOST
              valueFrom:
                secretKeyRef:
                  name: ${{ defaults.app_name }}-pg-conn-credential
                  key: host
            - name: TOOLJET_DB_PORT
              valueFrom:
                secretKeyRef:
                  name: ${{ defaults.app_name }}-pg-conn-credential
                  key: port
            - name: TOOLJET_DB_USER
              valueFrom:
                secretKeyRef:
                  name: ${{ defaults.app_name }}-pg-conn-credential
                  key: username
            - name: TOOLJET_DB_PASS
              valueFrom:
                secretKeyRef:
                  name: ${{ defaults.app_name }}-pg-conn-credential
                  key: password
            - name: TOOLJET_DB_RECONFIG
              value: 'true'
            - name: REDIS_HOST
              value: ${{ defaults.app_name }}-redis-redis.${{ SEALOS_NAMESPACE }}.svc
            - name: REDIS_PORT
              valueFrom:
                secretKeyRef:
                  name: ${{ defaults.app_name }}-redis-conn-credential
                  key: port
            - name: REDIS_USERNAME
              valueFrom:
                secretKeyRef:
                  name: ${{ defaults.app_name }}-redis-conn-credential
                  key: username
            - name: REDIS_USER
              valueFrom:
                secretKeyRef:
                  name: ${{ defaults.app_name }}-redis-conn-credential
                  key: username
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ${{ defaults.app_name }}-redis-conn-credential
                  key: password
            - name: PGRST_JWT_SECRET
              value: ${{ defaults.pgrst_jwt_secret }}
            - name: PGRST_DB_PRE_CONFIG
              value: postgrest.pre_config
            - name: CHECK_FOR_UPDATES
              value: '0'
            - name: DISABLE_TOOLJET_TELEMETRY
              value: 'true'
            - name: DISABLE_CUSTOM_QUERY_LOGGING
              value: 'true'
            - name: SMTP_DISABLED
              value: 'true'
            - name: DEFAULT_FROM_EMAIL
              value: ${{ inputs.admin_email }}
            - name: ENABLE_MULTIPLAYER_EDITING
              value: 'true'
            - name: USER_SESSION_EXPIRY
              value: '2880'
            - name: DEPLOYMENT_PLATFORM
              value: k8s:sealos
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          startupProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            limits:
              cpu: 500m
              memory: 1536Mi
            requests:
              cpu: 50m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: ${{ defaults.app_name }}
  labels:
    app: ${{ defaults.app_name }}
    cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}
spec:
  ports:
    - name: http
      port: 3000
      targetPort: 3000
  selector:
    app: ${{ defaults.app_name }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ${{ defaults.app_name }}
  labels:
    cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}
    cloud.sealos.io/app-deploy-manager-domain: ${{ defaults.app_host }}
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: 32m
    nginx.ingress.kubernetes.io/server-snippet: |
      client_header_buffer_size 64k;
      large_client_header_buffers 4 128k;
    nginx.ingress.kubernetes.io/ssl-redirect: 'true'
    nginx.ingress.kubernetes.io/backend-protocol: HTTP
    nginx.ingress.kubernetes.io/client-body-buffer-size: 64k
    nginx.ingress.kubernetes.io/proxy-buffer-size: 64k
    nginx.ingress.kubernetes.io/proxy-send-timeout: '300'
    nginx.ingress.kubernetes.io/proxy-read-timeout: '300'
    nginx.ingress.kubernetes.io/configuration-snippet: |
      if ($request_uri ~* \.(js|css|gif|jpe?g|png)) {
        expires 30d;
        add_header Cache-Control "public";
      }
spec:
  rules:
    - host: ${{ defaults.app_host }}.${{ SEALOS_CLOUD_DOMAIN }}
      http:
        paths:
          - pathType: Prefix
            path: /
            backend:
              service:
                name: ${{ defaults.app_name }}
                port:
                  number: 3000
  tls:
    - hosts:
        - ${{ defaults.app_host }}.${{ SEALOS_CLOUD_DOMAIN }}
      secretName: ${{ SEALOS_CERT_SECRET_NAME }}
---
apiVersion: app.sealos.io/v1
kind: App
metadata:
  name: ${{ defaults.app_name }}
  labels:
    cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}
spec:
  data:
    url: https://${{ defaults.app_host }}.${{ SEALOS_CLOUD_DOMAIN }}
  displayType: normal
  icon: 'https://raw.githubusercontent.com/labring-sigs/templates/main/template/tooljet/logo.svg'
  name: ToolJet
  type: iframe
