apiVersion: app.sealos.io/v1
kind: Template
metadata:
  name: tooljet
spec:
  title: ToolJet
  url: https://www.tooljet.ai/
  gitRepo: https://github.com/ToolJet/ToolJet
  author: Sealos
  description: Open-source low-code platform for building internal tools, business applications, dashboards, and automated workflows.
  readme: 'https://raw.githubusercontent.com/labring-sigs/templates/main/template/tooljet/README.md'
  icon: 'https://raw.githubusercontent.com/labring-sigs/templates/main/template/tooljet/logo.svg'
  screenshots:
    - 'https://raw.githubusercontent.com/labring-sigs/templates/main/template/tooljet/website-screenshot.webp'
  templateType: inline
  locale: en
  i18n:
    zh:
      description: 用于构建内部工具、业务应用、仪表盘和自动化工作流的开源低代码平台。
      readme: 'https://raw.githubusercontent.com/labring-sigs/templates/main/template/tooljet/README_zh.md'
  categories:
    - low-code
    - tool
  defaults:
    app_host:
      type: string
      value: tooljet-${{ random(8) }}
    app_name:
      type: string
      value: tooljet-${{ random(8) }}
    lockbox_master_key:
      type: string
      value: ${{ random(64).toLowerCase().replace(/[^0-9a-f]/g, 'a') }}
    secret_key_base:
      type: string
      value: ${{ random(128).toLowerCase().replace(/[^0-9a-f]/g, 'a') }}
    pgrst_jwt_secret:
      type: string
      value: ${{ random(64).toLowerCase().replace(/[^0-9a-f]/g, 'a') }}
  inputs:
    tooljet_image:
      description: ToolJet CE image. The upstream image currently supports amd64 only.
      type: string
      default: tooljet/tooljet-ce:v3.20.170-lts
      required: true
    admin_email:
      description: Initial administrator email address used for first-time registration guidance
      type: string
      default: admin@example.com
      required: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ${{ defaults.app_name }}-pg
  labels:
    sealos-db-provider-cr: ${{ defaults.app_name }}-pg
    app.kubernetes.io/instance: ${{ defaults.app_name }}-pg
    app.kubernetes.io/managed-by: kbcli
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ${{ defaults.app_name }}-pg
  labels:
    sealos-db-provider-cr: ${{ defaults.app_name }}-pg
    app.kubernetes.io/instance: ${{ defaults.app_name }}-pg
    app.kubernetes.io/managed-by: kbcli
rules:
  - apiGroups:
      - '*'
    resources:
      - '*'
    verbs:
      - '*'
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ${{ defaults.app_name }}-pg
  labels:
    sealos-db-provider-cr: ${{ defaults.app_name }}-pg
    app.kubernetes.io/instance: ${{ defaults.app_name }}-pg
    app.kubernetes.io/managed-by: kbcli
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ${{ defaults.app_name }}-pg
subjects:
  - kind: ServiceAccount
    name: ${{ defaults.app_name }}-pg
---
apiVersion: apps.kubeblocks.io/v1alpha1
kind: Cluster
metadata:
  name: ${{ defaults.app_name }}-pg
  labels:
    kb.io/database: postgresql-14.8.0
    clusterdefinition.kubeblocks.io/name: postgresql
    clusterversion.kubeblocks.io/name: postgresql-14.8.0
    sealos-db-provider-cr: ${{ defaults.app_name }}-pg
spec:
  affinity:
    podAntiAffinity: Preferred
    tenancy: SharedNode
  clusterDefinitionRef: postgresql
  clusterVersionRef: postgresql-14.8.0
  terminationPolicy: Delete
  componentSpecs:
    - name: postgresql
      componentDefRef: postgresql
      disableExporter: true
      enabledLogs:
        - running
      replicas: 1
      serviceAccountName: ${{ defaults.app_name }}-pg
      switchPolicy:
        type: Noop
      resources:
        limits:
          cpu: 500m
          memory: 512Mi
        requests:
          cpu: 50m
          memory: 51Mi
      volumeClaimTemplates:
        - name: data
          spec:
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 1Gi
            storageClassName: openebs-backup
---
