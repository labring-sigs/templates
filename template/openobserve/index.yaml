apiVersion: app.sealos.io/v1
kind: Template
metadata:
  name: openobserve
spec:
  title: 'OpenObserve'
  url: 'https://openobserve.ai/'
  gitRepo: 'https://github.com/openobserve/openobserve'
  author: 'baerwang'
  description: 'OpenObserve is a cloud native observability platform built specifically for logs, metrics, traces, analytics, RUM (Real User Monitoring - Performance, Errors, Session Replay) designed to work at petabyte scale.'
  readme: 'https://raw.githubusercontent.com/labring-sigs/templates/main/template/openobserve/README.md'
  icon: 'https://raw.githubusercontent.com/labring-sigs/templates/main/template/openobserve/logo.svg'
  screenshots:
    - 'https://raw.githubusercontent.com/labring-sigs/templates/main/template/openobserve/website-screenshot.webp'
  templateType: inline
  locale: en
  categories:
    - monitor
  defaults:
    app_host:
      type: string
      value: ${{ random(8) }}
    app_name:
      type: string
      value: openobserve-${{ random(8) }}
  inputs:
    mail:
      description: 'Root user email for the OpenObserve administrator account.'
      type: string
      default: 'root@example.com'
      required: true
    password:
      description: 'Root user password for the OpenObserve administrator account.'
      type: string
      default: 'Complexpass#123'
      required: true
    data_dir:
      description: 'Persistent data directory used by OpenObserve.'
      type: string
      default: '/data'
      required: true
  i18n:
    zh:
      description: 开源云原生可观测性平台，支持日志、指标、链路追踪、分析和真实用户监控。
      readme: 'https://raw.githubusercontent.com/labring-sigs/templates/main/template/openobserve/README_zh.md'
---
apiVersion: v1
kind: Service
metadata:
  name: ${{ defaults.app_name }}
  labels:
    cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}
    app: ${{ defaults.app_name }}
spec:
  clusterIP: None
  selector:
    app: ${{ defaults.app_name }}
  ports:
    - name: http
      port: 443
      targetPort: 5080
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ${{ defaults.app_name }}
  annotations:
    originImageName: public.ecr.aws/zinclabs/openobserve:v0.90.3
    docker-to-sealos.resource-override-source: Live Sealos cold-start validation on v0.90.3 observed 197Mi after first cold start and 178Mi after a probe-enabled restart; 256Mi is below safe headroom, so 512Mi is the minimum stable Sealos memory ladder value.
    deploy.cloud.sealos.io/minReplicas: '1'
    deploy.cloud.sealos.io/maxReplicas: '1'
  labels:
    cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}
    app: ${{ defaults.app_name }}
spec:
  serviceName: ${{ defaults.app_name }}
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      name: ${{ defaults.app_name }}
      app: ${{ defaults.app_name }}
  template:
    metadata:
      labels:
        name: ${{ defaults.app_name }}
        app: ${{ defaults.app_name }}
    spec:
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 2000
        runAsUser: 10000
        runAsGroup: 3000
        runAsNonRoot: true
      containers:
        - name: ${{ defaults.app_name }}
          image: public.ecr.aws/zinclabs/openobserve:v0.90.3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          env:
            - name: ZO_ROOT_USER_EMAIL
              value: ${{ inputs.mail }}
            - name: ZO_ROOT_USER_PASSWORD
              value: ${{ inputs.password }}
            - name: ZO_DATA_DIR
              value: ${{ inputs.data_dir }}
          imagePullPolicy: IfNotPresent
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 50m
              memory: 51Mi
          ports:
            - containerPort: 5080
              name: http
          startupProbe:
            httpGet:
              path: /healthz
              port: 5080
            periodSeconds: 5
            failureThreshold: 24
          readinessProbe:
            httpGet:
              path: /healthz
              port: 5080
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 5080
            periodSeconds: 20
            failureThreshold: 3
          volumeMounts:
            - name: data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ${{ defaults.app_name }}
  labels:
    cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}
    cloud.sealos.io/app-deploy-manager-domain: ${{ defaults.app_host }}
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: 32m
    nginx.ingress.kubernetes.io/server-snippet: |
      client_header_buffer_size 64k;
      large_client_header_buffers 4 128k;
    nginx.ingress.kubernetes.io/ssl-redirect: 'true'
    nginx.ingress.kubernetes.io/backend-protocol: HTTP
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/client-body-buffer-size: 64k
    nginx.ingress.kubernetes.io/proxy-buffer-size: 64k
    nginx.ingress.kubernetes.io/proxy-send-timeout: '300'
    nginx.ingress.kubernetes.io/proxy-read-timeout: '300'
    nginx.ingress.kubernetes.io/configuration-snippet: |
      if ($request_uri ~* \.(js|css|gif|jpe?g|png)) {
        expires 30d;
        add_header Cache-Control "public";
      }
spec:
  rules:
    - host: ${{ defaults.app_host }}.${{ SEALOS_CLOUD_DOMAIN }}
      http:
        paths:
          - pathType: Prefix
            path: /()(.*)
            backend:
              service:
                name: ${{ defaults.app_name }}
                port:
                  number: 443
  tls:
    - hosts:
        - ${{ defaults.app_host }}.${{ SEALOS_CLOUD_DOMAIN }}
      secretName: ${{ SEALOS_CERT_SECRET_NAME }}
---
apiVersion: app.sealos.io/v1
kind: App
metadata:
  name: ${{ defaults.app_name }}
  labels:
    cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}
spec:
  data:
    url: https://${{ defaults.app_host }}.${{ SEALOS_CLOUD_DOMAIN }}
  displayType: normal
  icon: https://raw.githubusercontent.com/labring-sigs/templates/main/template/openobserve/logo.svg
  name: OpenObserve
  type: link
