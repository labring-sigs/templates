apiVersion: app.sealos.io/v1
kind: Template
metadata:
  name: edgequake
spec:
  title: EdgeQuake
  url: https://github.com/raphaelmansuy/edgequake
  gitRepo: https://github.com/raphaelmansuy/edgequake
  author: Sealos
  description: High-performance Rust Graph-RAG platform with PostgreSQL, pgvector, Apache AGE-compatible graph storage, REST API, and a React/Next.js Web UI.
  readme: https://raw.githubusercontent.com/labring-sigs/templates/main/template/edgequake/README.md
  icon: https://raw.githubusercontent.com/labring-sigs/templates/main/template/edgequake/logo.svg
  templateType: inline
  locale: en
  i18n:
    zh:
      description: 基于 Rust 的高性能 Graph-RAG 平台，提供 PostgreSQL 持久化、pgvector 向量检索、Apache AGE 兼容图存储、REST API 和 React/Next.js Web UI。
      readme: https://raw.githubusercontent.com/labring-sigs/templates/main/template/edgequake/README_zh.md
  categories:
    - ai
    - backend
    - frontend
    - tool
  defaults:
    app_name:
      type: string
      value: edgequake-${{ random(8) }}
    app_host:
      type: string
      value: edgequake-${{ random(8) }}
    api_host:
      type: string
      value: edgequake-api-${{ random(8) }}
  inputs:
    EDGEQUAKE_LLM_PROVIDER:
      description: LLM provider name, such as openai, mistral, anthropic, gemini, ollama, or mock.
      type: choice
      default: openai
      required: true
      options:
        - openai
        - mistral
        - anthropic
        - gemini
        - ollama
        - mock
    OPENAI_API_KEY:
      description: OpenAI API key used when EDGEQUAKE_LLM_PROVIDER is openai.
      type: string
      default: ''
      required: true
    OPENAI_BASE_URL:
      description: Optional OpenAI-compatible API base URL.
      type: string
      default: ''
      required: false
    RUST_LOG:
      description: Rust log filter for the EdgeQuake API container.
      type: string
      default: info
      required: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  labels:
    sealos-db-provider-cr: ${{ defaults.app_name }}-pg
    app.kubernetes.io/instance: ${{ defaults.app_name }}-pg
    app.kubernetes.io/managed-by: kbcli
  name: ${{ defaults.app_name }}-pg
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  labels:
    sealos-db-provider-cr: ${{ defaults.app_name }}-pg
    app.kubernetes.io/instance: ${{ defaults.app_name }}-pg
    app.kubernetes.io/managed-by: kbcli
  name: ${{ defaults.app_name }}-pg
rules:
  - apiGroups:
      - '*'
    resources:
      - '*'
    verbs:
      - '*'
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  labels:
    sealos-db-provider-cr: ${{ defaults.app_name }}-pg
    app.kubernetes.io/instance: ${{ defaults.app_name }}-pg
    app.kubernetes.io/managed-by: kbcli
  name: ${{ defaults.app_name }}-pg
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ${{ defaults.app_name }}-pg
subjects:
  - kind: ServiceAccount
    name: ${{ defaults.app_name }}-pg
---
apiVersion: apps.kubeblocks.io/v1alpha1
kind: Cluster
metadata:
  finalizers:
    - cluster.kubeblocks.io/finalizer
  labels:
    kb.io/database: postgresql-14.8.0
    clusterdefinition.kubeblocks.io/name: postgresql
    clusterversion.kubeblocks.io/name: postgresql-14.8.0
    sealos-db-provider-cr: ${{ defaults.app_name }}-pg
  name: ${{ defaults.app_name }}-pg
spec:
  affinity:
    podAntiAffinity: Preferred
    tenancy: SharedNode
  clusterDefinitionRef: postgresql
  clusterVersionRef: postgresql-14.8.0
  componentSpecs:
    - componentDefRef: postgresql
      disableExporter: true
      enabledLogs:
        - running
      name: postgresql
      replicas: 1
      resources:
        limits:
          cpu: 500m
          memory: 512Mi
        requests:
          cpu: 50m
          memory: 51Mi
      serviceAccountName: ${{ defaults.app_name }}-pg
      switchPolicy:
        type: Noop
      volumeClaimTemplates:
        - name: data
          spec:
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 1Gi
            storageClassName: openebs-backup
  terminationPolicy: Delete
  tolerations: []
---
apiVersion: batch/v1
kind: Job
metadata:
  name: ${{ defaults.app_name }}-pg-init
  labels:
    cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}-pg-init
spec:
  backoffLimit: 3
  template:
    spec:
      automountServiceAccountToken: false
      containers:
        - name: pgsql-init
          image: postgres:14.8-alpine
          imagePullPolicy: IfNotPresent
          resources:
            limits:
              cpu: 200m
              memory: 256Mi
            requests:
              cpu: 20m
              memory: 25Mi
          env:
            - name: PG_HOST
              valueFrom:
                secretKeyRef:
                  name: ${{ defaults.app_name }}-pg-conn-credential
                  key: host
            - name: PG_PORT
              valueFrom:
                secretKeyRef:
                  name: ${{ defaults.app_name }}-pg-conn-credential
                  key: port
            - name: PG_USERNAME
              valueFrom:
                secretKeyRef:
                  name: ${{ defaults.app_name }}-pg-conn-credential
                  key: username
            - name: PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ${{ defaults.app_name }}-pg-conn-credential
                  key: password
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              export PGPASSWORD="${PG_PASSWORD}"
              for i in $(seq 1 60); do
                if pg_isready -h "${PG_HOST}" -p "${PG_PORT}" -U "${PG_USERNAME}" -d postgres >/dev/null 2>&1; then
                  break
                fi
                sleep 2
              done
              pg_isready -h "${PG_HOST}" -p "${PG_PORT}" -U "${PG_USERNAME}" -d postgres >/dev/null 2>&1
              if ! psql -h "${PG_HOST}" -p "${PG_PORT}" -U "${PG_USERNAME}" -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname='edgequake'" | grep -q 1; then
                psql -h "${PG_HOST}" -p "${PG_PORT}" -U "${PG_USERNAME}" -d postgres -v ON_ERROR_STOP=1 -c "CREATE DATABASE \"edgequake\";"
              fi
              psql -h "${PG_HOST}" -p "${PG_PORT}" -U "${PG_USERNAME}" -d edgequake -v ON_ERROR_STOP=1 -c 'CREATE EXTENSION IF NOT EXISTS "uuid-ossp";'
              psql -h "${PG_HOST}" -p "${PG_PORT}" -U "${PG_USERNAME}" -d edgequake -v ON_ERROR_STOP=1 -c 'CREATE EXTENSION IF NOT EXISTS "vector";'
              psql -h "${PG_HOST}" -p "${PG_PORT}" -U "${PG_USERNAME}" -d edgequake -v ON_ERROR_STOP=1 -c 'CREATE EXTENSION IF NOT EXISTS "age" CASCADE;' || echo 'NOTICE: Apache AGE extension is unavailable; EdgeQuake will use fallback graph storage where supported.'
              if ! psql -h "${PG_HOST}" -p "${PG_PORT}" -U "${PG_USERNAME}" -d edgequake -tAc "SELECT 1 FROM pg_extension WHERE extname='age'" | grep -q 1; then
                for i in $(seq 1 120); do
                  if psql -h "${PG_HOST}" -p "${PG_PORT}" -U "${PG_USERNAME}" -d edgequake -tAc "SELECT to_regclass('public.entities') IS NOT NULL" | grep -q t; then
                    break
                  fi
                  sleep 2
                done
                psql -h "${PG_HOST}" -p "${PG_PORT}" -U "${PG_USERNAME}" -d edgequake -v ON_ERROR_STOP=1 <<'SQL'
              CREATE SCHEMA IF NOT EXISTS ag_catalog;
              CREATE OR REPLACE FUNCTION ag_catalog.agtype_to_json(input jsonb)
              RETURNS jsonb
              LANGUAGE sql
              IMMUTABLE
              AS $$ SELECT input $$;
              CREATE SCHEMA IF NOT EXISTS eq_eq_default_graph;
              CREATE OR REPLACE VIEW eq_eq_default_graph."_ag_label_vertex" AS
              SELECT
                e.id::text AS id,
                jsonb_strip_nulls(
                  jsonb_build_object(
                    'node_id', e.name,
                    'entity_id', e.id::text,
                    'entity_type', e.entity_type,
                    'description', e.description,
                    'tenant_id', e.tenant_id::text,
                    'workspace_id', e.workspace_id::text,
                    'source_ids', to_jsonb(e.source_ids),
                    'is_manual', e.is_manual,
                    'created_at', e.created_at::text,
                    'updated_at', e.updated_at::text
                  ) || COALESCE(e.metadata, '{}'::jsonb)
                ) AS properties
              FROM public.entities e;
              CREATE OR REPLACE VIEW eq_eq_default_graph."_ag_label_edge" AS
              SELECT
                r.id::text AS id,
                r.source_id::text AS start_id,
                r.target_id::text AS end_id,
                jsonb_strip_nulls(
                  jsonb_build_object(
                    'edge_id', r.id::text,
                    'source_id', src.name,
                    'target_id', dst.name,
                    'source_entity_id', r.source_id::text,
                    'target_entity_id', r.target_id::text,
                    'relation_type', r.relation_type,
                    'description', r.description,
                    'weight', r.weight,
                    'keywords', to_jsonb(r.keywords),
                    'tenant_id', r.tenant_id::text,
                    'workspace_id', r.workspace_id::text,
                    'source_chunk_ids', to_jsonb(r.source_chunk_ids),
                    'is_manual', r.is_manual,
                    'created_at', r.created_at::text,
                    'updated_at', r.updated_at::text
                  ) || COALESCE(r.metadata, '{}'::jsonb)
                ) AS properties
              FROM public.relationships r
              LEFT JOIN public.entities src ON src.id = r.source_id
              LEFT JOIN public.entities dst ON dst.id = r.target_id;
              SQL
              fi
      restartPolicy: OnFailure
  ttlSecondsAfterFinished: 300
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${{ defaults.app_name }}-api
  annotations:
    originImageName: ghcr.io/raphaelmansuy/edgequake:0.12.2
    deploy.cloud.sealos.io/minReplicas: '1'
    deploy.cloud.sealos.io/maxReplicas: '1'
  labels:
    app: ${{ defaults.app_name }}-api
    cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}-api
spec:
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app: ${{ defaults.app_name }}-api
  template:
    metadata:
      labels:
        app: ${{ defaults.app_name }}-api
    spec:
      automountServiceAccountToken: false
      containers:
        - name: ${{ defaults.app_name }}-api
          image: ghcr.io/raphaelmansuy/edgequake:0.12.2
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          resources:
            limits:
              cpu: 200m
              memory: 256Mi
            requests:
              cpu: 20m
              memory: 25Mi
          env:
            - name: SEALOS_DATABASE_POSTGRES_HOST
              valueFrom:
                secretKeyRef:
                  name: ${{ defaults.app_name }}-pg-conn-credential
                  key: host
            - name: SEALOS_DATABASE_POSTGRES_PORT
              valueFrom:
                secretKeyRef:
                  name: ${{ defaults.app_name }}-pg-conn-credential
                  key: port
            - name: SEALOS_DATABASE_POSTGRES_USERNAME
              valueFrom:
                secretKeyRef:
                  name: ${{ defaults.app_name }}-pg-conn-credential
                  key: username
            - name: SEALOS_DATABASE_POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ${{ defaults.app_name }}-pg-conn-credential
                  key: password
            - name: DATABASE_URL
              value: postgres://$(SEALOS_DATABASE_POSTGRES_USERNAME):$(SEALOS_DATABASE_POSTGRES_PASSWORD)@$(SEALOS_DATABASE_POSTGRES_HOST):$(SEALOS_DATABASE_POSTGRES_PORT)/edgequake
            - name: HOST
              value: 0.0.0.0
            - name: PORT
              value: '8080'
            - name: EDGEQUAKE_LLM_PROVIDER
              value: ${{ inputs.EDGEQUAKE_LLM_PROVIDER }}
            - name: OPENAI_API_KEY
              value: ${{ inputs.OPENAI_API_KEY }}
            - name: OPENAI_BASE_URL
              value: ${{ inputs.OPENAI_BASE_URL }}
            - name: RUST_LOG
              value: ${{ inputs.RUST_LOG }}
          startupProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /live
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${{ defaults.app_name }}
  annotations:
    originImageName: ghcr.io/raphaelmansuy/edgequake-frontend:0.12.2
    deploy.cloud.sealos.io/minReplicas: '1'
    deploy.cloud.sealos.io/maxReplicas: '1'
  labels:
    app: ${{ defaults.app_name }}
    cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}
spec:
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app: ${{ defaults.app_name }}
  template:
    metadata:
      labels:
        app: ${{ defaults.app_name }}
    spec:
      automountServiceAccountToken: false
      containers:
        - name: ${{ defaults.app_name }}
          image: ghcr.io/raphaelmansuy/edgequake-frontend:0.12.2
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          resources:
            limits:
              cpu: 200m
              memory: 256Mi
            requests:
              cpu: 20m
              memory: 25Mi
          env:
            - name: NODE_ENV
              value: production
            - name: EDGEQUAKE_API_URL
              value: https://${{ defaults.api_host }}.${{ SEALOS_CLOUD_DOMAIN }}
          command:
            - /bin/sh
            - -c
          args:
            - |
              set -eu
              old="http://localhost:8080"
              new="${EDGEQUAKE_API_URL:-}"
              if [ -n "${new}" ]; then
                for dir in /app/.next/server /app/.next/standalone/.next/server /app/.next/static; do
                  if [ -d "${dir}" ]; then
                    grep -R -l "${old}" "${dir}" 2>/dev/null | while IFS= read -r file; do
                      [ -n "${file}" ] && sed -i "s|${old}|${new}|g" "${file}"
                    done
                  fi
                done
              fi
              exec pnpm start
          startupProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 18
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: ${{ defaults.app_name }}-api
  labels:
    app: ${{ defaults.app_name }}-api
    cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}-api
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
  selector:
    app: ${{ defaults.app_name }}-api
---
apiVersion: v1
kind: Service
metadata:
  name: ${{ defaults.app_name }}
  labels:
    app: ${{ defaults.app_name }}
    cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      protocol: TCP
  selector:
    app: ${{ defaults.app_name }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ${{ defaults.app_name }}-api
  labels:
    app: ${{ defaults.app_name }}-api
    cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}-api
    cloud.sealos.io/app-deploy-manager-domain: ${{ defaults.api_host }}
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: 32m
    nginx.ingress.kubernetes.io/server-snippet: |
      client_header_buffer_size 64k;
      large_client_header_buffers 4 128k;
    nginx.ingress.kubernetes.io/ssl-redirect: 'true'
    nginx.ingress.kubernetes.io/backend-protocol: HTTP
    nginx.ingress.kubernetes.io/client-body-buffer-size: 64k
    nginx.ingress.kubernetes.io/proxy-buffer-size: 64k
    nginx.ingress.kubernetes.io/proxy-send-timeout: '300'
    nginx.ingress.kubernetes.io/proxy-read-timeout: '300'
    nginx.ingress.kubernetes.io/configuration-snippet: |
      if ($request_uri ~* \.(js|css|gif|jpe?g|png)) {
        expires 30d;
        add_header Cache-Control "public";
      }
spec:
  rules:
    - host: ${{ defaults.api_host }}.${{ SEALOS_CLOUD_DOMAIN }}
      http:
        paths:
          - pathType: Prefix
            path: /
            backend:
              service:
                name: ${{ defaults.app_name }}-api
                port:
                  number: 8080
  tls:
    - hosts:
        - ${{ defaults.api_host }}.${{ SEALOS_CLOUD_DOMAIN }}
      secretName: ${{ SEALOS_CERT_SECRET_NAME }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ${{ defaults.app_name }}
  labels:
    app: ${{ defaults.app_name }}
    cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}
    cloud.sealos.io/app-deploy-manager-domain: ${{ defaults.app_host }}
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: 32m
    nginx.ingress.kubernetes.io/server-snippet: |
      client_header_buffer_size 64k;
      large_client_header_buffers 4 128k;
    nginx.ingress.kubernetes.io/ssl-redirect: 'true'
    nginx.ingress.kubernetes.io/backend-protocol: HTTP
    nginx.ingress.kubernetes.io/client-body-buffer-size: 64k
    nginx.ingress.kubernetes.io/proxy-buffer-size: 64k
    nginx.ingress.kubernetes.io/proxy-send-timeout: '300'
    nginx.ingress.kubernetes.io/proxy-read-timeout: '300'
    nginx.ingress.kubernetes.io/configuration-snippet: |
      if ($request_uri ~* \.(js|css|gif|jpe?g|png)) {
        expires 30d;
        add_header Cache-Control "public";
      }
spec:
  rules:
    - host: ${{ defaults.app_host }}.${{ SEALOS_CLOUD_DOMAIN }}
      http:
        paths:
          - pathType: Prefix
            path: /
            backend:
              service:
                name: ${{ defaults.app_name }}
                port:
                  number: 3000
  tls:
    - hosts:
        - ${{ defaults.app_host }}.${{ SEALOS_CLOUD_DOMAIN }}
      secretName: ${{ SEALOS_CERT_SECRET_NAME }}
---
apiVersion: app.sealos.io/v1
kind: App
metadata:
  name: ${{ defaults.app_name }}
  labels:
    cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}
spec:
  data:
    url: https://${{ defaults.app_host }}.${{ SEALOS_CLOUD_DOMAIN }}
  displayType: normal
  icon: https://raw.githubusercontent.com/labring-sigs/templates/main/template/edgequake/logo.svg
  name: EdgeQuake
  type: link
