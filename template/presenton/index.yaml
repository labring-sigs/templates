apiVersion: app.sealos.io/v1
kind: Template
metadata:
  name: presenton
spec:
  title: Presenton
  url: https://presenton.ai/
  gitRepo: https://github.com/presenton/presenton
  author: Sealos
  description: Open-source AI presentation generator and API with self-hosted model, image, template, and export controls.
  readme: https://raw.githubusercontent.com/labring-sigs/templates/main/template/presenton/README.md
  icon: https://raw.githubusercontent.com/labring-sigs/templates/main/template/presenton/logo.png
  screenshots:
    - 'https://raw.githubusercontent.com/labring-sigs/templates/main/template/presenton/website-screenshot.webp'
  templateType: inline
  locale: en
  i18n:
    zh:
      description: 开源 AI 演示文稿生成器和 API，支持自托管模型、图像生成、模板与导出控制。
      readme: https://raw.githubusercontent.com/labring-sigs/templates/main/template/presenton/README_zh.md
  categories:
    - ai
    - tool
  defaults:
    app_host:
      type: string
      value: presenton-${{ random(8) }}
    app_name:
      type: string
      value: presenton-${{ random(8) }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ${{ defaults.app_name }}
  annotations:
    originImageName: ghcr.io/presenton/presenton:v0.8.2-beta
    deploy.cloud.sealos.io/minReplicas: '1'
    deploy.cloud.sealos.io/maxReplicas: '1'
  labels:
    app: ${{ defaults.app_name }}
    cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}
spec:
  replicas: 1
  revisionHistoryLimit: 1
  serviceName: ${{ defaults.app_name }}
  selector:
    matchLabels:
      app: ${{ defaults.app_name }}
  template:
    metadata:
      labels:
        app: ${{ defaults.app_name }}
    spec:
      terminationGracePeriodSeconds: 30
      automountServiceAccountToken: false
      containers:
        - name: ${{ defaults.app_name }}
          image: ghcr.io/presenton/presenton:v0.8.2-beta
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          env:
            - name: APP_DATA_DIRECTORY
              value: /app_data
            - name: MIGRATE_DATABASE_ON_STARTUP
              value: 'true'
            - name: START_OLLAMA
              value: 'false'
            - name: MEM0_ENABLED
              value: 'false'
            - name: MEM0_DIR
              value: /app_data/mem0
            - name: MEM0_EMBEDDER_PROVIDER
              value: fastembed
            - name: MEM0_EMBEDDER_MODEL
              value: BAAI/bge-small-en-v1.5
            - name: MEM0_EMBEDDING_DIMS
              value: '384'
            - name: MEM0_SPACY_MODEL
              value: en_core_web_sm
            - name: MEM0_REQUIRE_SPACY_MODEL
              value: 'true'
            - name: LITEPARSE_DPI
              value: '120'
            - name: LITEPARSE_NUM_WORKERS
              value: '1'
          resources:
            requests:
              cpu: 50m
              memory: 204Mi
            limits:
              cpu: 500m
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /
              port: http
              scheme: HTTP
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /
              port: http
              scheme: HTTP
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
          startupProbe:
            httpGet:
              path: /
              port: http
              scheme: HTTP
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 60
          volumeMounts:
            - name: vn-appvn-data
              mountPath: /app_data
  volumeClaimTemplates:
    - metadata:
        annotations:
          path: /app_data
          value: '1'
        name: vn-appvn-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: ${{ defaults.app_name }}
  labels:
    app: ${{ defaults.app_name }}
    cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
  selector:
    app: ${{ defaults.app_name }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ${{ defaults.app_name }}
  labels:
    app: ${{ defaults.app_name }}
    cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}
    cloud.sealos.io/app-deploy-manager-domain: ${{ defaults.app_host }}
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: 32m
    nginx.ingress.kubernetes.io/server-snippet: |
      client_header_buffer_size 64k;
      large_client_header_buffers 4 128k;
    nginx.ingress.kubernetes.io/ssl-redirect: 'true'
    nginx.ingress.kubernetes.io/backend-protocol: HTTP
    nginx.ingress.kubernetes.io/client-body-buffer-size: 64k
    nginx.ingress.kubernetes.io/proxy-buffer-size: 64k
    nginx.ingress.kubernetes.io/proxy-send-timeout: '300'
    nginx.ingress.kubernetes.io/proxy-read-timeout: '300'
    nginx.ingress.kubernetes.io/configuration-snippet: |
      if ($request_uri ~* \.(js|css|gif|jpe?g|png)) {
        expires 30d;
        add_header Cache-Control "public";
      }
spec:
  rules:
    - host: ${{ defaults.app_host }}.${{ SEALOS_CLOUD_DOMAIN }}
      http:
        paths:
          - pathType: Prefix
            path: /
            backend:
              service:
                name: ${{ defaults.app_name }}
                port:
                  number: 80
  tls:
    - hosts:
        - ${{ defaults.app_host }}.${{ SEALOS_CLOUD_DOMAIN }}
      secretName: ${{ SEALOS_CERT_SECRET_NAME }}
---
apiVersion: app.sealos.io/v1
kind: App
metadata:
  name: ${{ defaults.app_name }}
  labels:
    app: ${{ defaults.app_name }}
    cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}
spec:
  data:
    url: https://${{ defaults.app_host }}.${{ SEALOS_CLOUD_DOMAIN }}
  displayType: normal
  icon: https://raw.githubusercontent.com/labring-sigs/templates/main/template/presenton/logo.png
  name: Presenton
  type: link