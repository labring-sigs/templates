apiVersion: app.sealos.io/v1
kind: Template
metadata:
  name: logstash
spec:
  title: "Logstash"
  url: "https://www.elastic.co/logstash"
  gitRepo: "https://github.com/elastic/logstash"
  author: "Sealos"
  description: "Logstash is a server-side data processing pipeline for ingesting Beats data and forwarding it to Elasticsearch."
  readme: "https://raw.githubusercontent.com/labring-actions/templates/main/logstash/README.md"
  icon: "https://raw.githubusercontent.com/labring-actions/templates/main/template/logstash/favicon.ico"
  templateType: inline
  categories:
    - tools
  defaults:
    app_name:
      type: string
      value: logstash-${{ random(8) }}
  inputs:
    ELASTICSEARCH_USERNAME:
      description: "Elasticsearch username for Logstash output"
      type: string
      default: "elastic"
      required: true
    ELASTICSEARCH_PASSWORD:
      description: "Elasticsearch password for Logstash output"
      type: string
      default: ""
      required: true
    ELASTICSEARCH_HOST:
      description: "Elasticsearch host for Logstash output"
      type: string
      default: "elasticsearch.logging.svc.cluster.local:9200"
      required: true

---
apiVersion: v1
kind: Secret
metadata:
  name: ${{ defaults.app_name }}-es-auth
  labels:
    cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}
type: Opaque
stringData:
  ELASTICSEARCH_USERNAME: ${{ inputs.elasticsearch_username }}
  ELASTICSEARCH_PASSWORD: ${{ inputs.elasticsearch_password }}

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ${{ defaults.app_name }}-config
  labels:
    cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}
    app: ${{ defaults.app_name }}
data:
  logstash.yml: |
    http.host: 0.0.0.0
    xpack.monitoring.enabled: false

    queue.type: persisted
    path.queue: /usr/share/logstash/data/queue
    queue.max_bytes: 1gb

    dead_letter_queue.enable: true
    path.dead_letter_queue: /usr/share/logstash/data/dead_letter_queue

    config.reload.automatic: false
    config.reload.interval: 10s

    log.level: info
    path.logs: /usr/share/logstash/logs

  pipelines.yml: |
    - pipeline.id: main
      path.config: "/usr/share/logstash/pipeline/*.conf"
      pipeline.workers: 2
      pipeline.batch.size: 125
      pipeline.batch.delay: 50

  logstash.conf: |
    input {
      beats {
        port => 5044
        client_inactivity_timeout => 300
      }
    }

    filter {
    }

    output {
      elasticsearch {
        hosts => ["http://${{ inputs.ELASTICSEARCH_HOST }}"]
        user => "${{ inputs.ELASTICSEARCH_USERNAME }}"
        password => "${{ inputs.ELASTICSEARCH_PASSWORD }}"
        index => "logstash-%{+YYYY.MM.dd}"
        ilm_enabled => false
      }

      stdout {
        codec => rubydebug
      }
    }

---
apiVersion: v1
kind: Service
metadata:
  name: ${{ defaults.app_name }}-headless
  labels:
    cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}
    app: ${{ defaults.app_name }}
spec:
  clusterIP: None
  selector:
    app: ${{ defaults.app_name }}
  ports:
    - name: beats
      port: 5044
      targetPort: 5044
    - name: http
      port: 9600
      targetPort: 9600

---
apiVersion: v1
kind: Service
metadata:
  name: ${{ defaults.app_name }}
  labels:
    cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}
    app: ${{ defaults.app_name }}
spec:
  selector:
    app: ${{ defaults.app_name }}
  ports:
    - name: beats
      port: 5044
      targetPort: 5044
    - name: http
      port: 9600
      targetPort: 9600

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ${{ defaults.app_name }}
  annotations:
    originImageName: docker.elastic.co/logstash/logstash:6.8.6
    deploy.cloud.sealos.io/minReplicas: "1"
    deploy.cloud.sealos.io/maxReplicas: "1"
  labels:
    cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}
    app: ${{ defaults.app_name }}
spec:
  serviceName: ${{ defaults.app_name }}-headless
  replicas: 1
  selector:
    matchLabels:
      app: ${{ defaults.app_name }}
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: ${{ defaults.app_name }}
    spec:
      terminationGracePeriodSeconds: 120
      securityContext:
        fsGroup: 1000
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app: ${{ defaults.app_name }}
      containers:
        - name: ${{ defaults.app_name }}
          image: docker.elastic.co/logstash/logstash:6.8.6
          imagePullPolicy: IfNotPresent
          ports:
            - name: beats
              containerPort: 5044
            - name: http
              containerPort: 9600
          env:
            - name: LS_JAVA_OPTS
              value: "-Xms1g -Xmx1g"
            - name: ELASTICSEARCH_USERNAME
              valueFrom:
                secretKeyRef:
                  name: ${{ defaults.app_name }}-es-auth
                  key: ELASTICSEARCH_USERNAME
            - name: ELASTICSEARCH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ${{ defaults.app_name }}-es-auth
                  key: ELASTICSEARCH_PASSWORD
          resources:
            requests:
              cpu: "500m"
              memory: "2Gi"
            limits:
              cpu: "2"
              memory: "2Gi"
          readinessProbe:
            httpGet:
              path: /
              port: 9600
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /
              port: 9600
            initialDelaySeconds: 120
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/bash
                  - -c
                  - |
                    kill -TERM 1
                    sleep 60
          volumeMounts:
            - name: config
              mountPath: /usr/share/logstash/config/logstash.yml
              subPath: logstash.yml
            - name: config
              mountPath: /usr/share/logstash/config/pipelines.yml
              subPath: pipelines.yml
            - name: config
              mountPath: /usr/share/logstash/pipeline/logstash.conf
              subPath: logstash.conf
            - name: data
              mountPath: /usr/share/logstash/data
      volumes:
        - name: config
          configMap:
            name: ${{ defaults.app_name }}-config
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
