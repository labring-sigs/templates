apiVersion: app.sealos.io/v1
kind: Template
metadata:
  name: rabbitmq
spec:
  title: 'RabbitMQ'
  url: 'https://www.rabbitmq.com'
  gitRepo: 'https://github.com/rabbitmq/rabbitmq-server'
  author: 'Sealos'
  description: 'Open source RabbitMQ: core server and tier 1 (built-in) plugins'
  readme: 'https://raw.githubusercontent.com/rabbitmq/rabbitmq-server/refs/heads/main/README.md'
  icon: 'https://www.rabbitmq.com/img/rabbitmq-logo.svg'
  templateType: inline
  locale: en
  i18n:
    zh:
      title: 'RabbitMQ'
      description: 'RabbitMQ 是一款被广泛使用的开源消息代理（Message Broker），属于主流消息中间件，它用 Erlang 语言开发，实现了高级消息队列协议（AMQP），同时还支持 MQTT、STOMP 等多种协议，以可靠性、灵活路由、多语言客户端支持和丰富的管理工具著称，是分布式系统中实现异步通信、服务解耦的核心组件。'
  categories:
    - tools
  defaults:
    app_host:
      type: string
      value: rabbitmq-${{ random(8) }}
    app_name:
      type: string
      value: rabbitmq-${{ random(8) }}
  inputs:
    replica_count:
      description: 'RabbitMQ replicas count'
      type: number
      default: "3"
      required: true
    storage_size:
      description: 'Persistent storage size'
      type: string
      default: '5Gi'
      required: true
    cpu_limit:
      description: 'CPU limit'
      type: string
      default: '4'
      required: true
    memory_limit:
      description: 'Memory limit'
      type: string
      default: '8Gi'
      required: true
---
apiVersion: rabbitmq.com/v1beta1
kind: RabbitmqCluster
metadata:
  name: ${{ defaults.app_name }}
spec:
  image: rabbitmq:4.1.3-management
  replicas: ${{ inputs.replica_count }}
  service:
    labels:
      cloud.sealos.io/deploy-on-sealos: ${{ defaults.app_name }}
    type: NodePort
  resources:
    requests:
      cpu: 10m
      memory: 50Mi
    limits:
      cpu: ${{ inputs.cpu_limit }}
      memory: ${{ inputs.memory_limit }}
  rabbitmq:
    additionalConfig: |
      cluster_partition_handling = pause_minority
      disk_free_limit.relative = 1.0
      collect_statistics_interval = 10000
  persistence:
    # storageClassName: ssd
    storage: ${{ inputs.storage_size }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ${{ defaults.app_name }}
  labels:
    cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}
    cloud.sealos.io/app-deploy-manager-domain: ${{ defaults.app_host }}
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: 32m
    nginx.ingress.kubernetes.io/server-snippet: |
      client_header_buffer_size 64k;
      large_client_header_buffers 4 128k;
    nginx.ingress.kubernetes.io/ssl-redirect: 'true'
    nginx.ingress.kubernetes.io/backend-protocol: HTTP
    nginx.ingress.kubernetes.io/client-body-buffer-size: 64k
    nginx.ingress.kubernetes.io/proxy-buffer-size: 64k
    nginx.ingress.kubernetes.io/proxy-send-timeout: '300'
    nginx.ingress.kubernetes.io/proxy-read-timeout: '300'
    nginx.ingress.kubernetes.io/configuration-snippet: |
      if ($request_uri ~* \.(js|css|gif|jpe?g|png)) {
        expires 30d;
        add_header Cache-Control "public";
      }
spec:
  rules:
    - host: ${{ defaults.app_host }}.${{ SEALOS_CLOUD_DOMAIN }}
      http:
        paths:
          - pathType: Prefix
            path: /
            backend:
              service:
                name: ${{ defaults.app_name }}
                port:
                  number: 15672
  tls:
    - hosts:
        - ${{ defaults.app_host }}.${{ SEALOS_CLOUD_DOMAIN }}
      secretName: ${{ SEALOS_CERT_SECRET_NAME }}
---
apiVersion: app.sealos.io/v1
kind: App
metadata:
  name: ${{ defaults.app_name }}
  labels:
    cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}
spec:
  data:
    url: https://${{ defaults.app_host }}.${{ SEALOS_CLOUD_DOMAIN }}
  displayType: normal
  icon: 'https://www.rabbitmq.com/img/rabbitmq-logo.svg'
  name: RabbitMQ
  type: iframe
