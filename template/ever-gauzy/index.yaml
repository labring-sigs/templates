apiVersion: app.sealos.io/v1
kind: Template
metadata:
  name: ever-gauzy
spec:
  title: Ever Gauzy
  url: https://gauzy.co/
  gitRepo: https://github.com/ever-co/ever-gauzy
  author: Ever Co.
  description: Open business management platform for ERP, CRM, HRM, ATS, and project management.
  readme: https://raw.githubusercontent.com/labring-sigs/templates/main/template/ever-gauzy/README.md
  icon: https://raw.githubusercontent.com/labring-sigs/templates/main/template/ever-gauzy/logo.png
  screenshots:
    - https://raw.githubusercontent.com/labring-sigs/templates/main/template/ever-gauzy/website-screenshot.webp
  templateType: inline
  locale: en
  i18n:
    zh:
      description: 面向 ERP、CRM、HRM、ATS 与项目管理的开源业务管理平台。
      readme: https://raw.githubusercontent.com/labring-sigs/templates/main/template/ever-gauzy/README_zh.md
  categories:
    - tool
    - backend
  defaults:
    app_name:
      type: string
      value: ever-gauzy-${{ random(8) }}
    app_host:
      type: string
      value: ever-gauzy-${{ random(8) }}
    api_host:
      type: string
      value: ever-gauzy-api-${{ random(8) }}
    jwt_secret:
      type: string
      value: ${{ random(32) }}
    jwt_refresh_token_secret:
      type: string
      value: ${{ random(32) }}
    jwt_verification_token_secret:
      type: string
      value: ${{ random(32) }}
    express_session_secret:
      type: string
      value: ${{ random(32) }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ${{ defaults.app_name }}-pg
  labels:
    sealos-db-provider-cr: ${{ defaults.app_name }}-pg
    app.kubernetes.io/instance: ${{ defaults.app_name }}-pg
    app.kubernetes.io/managed-by: kbcli
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ${{ defaults.app_name }}-pg
  labels:
    sealos-db-provider-cr: ${{ defaults.app_name }}-pg
    app.kubernetes.io/instance: ${{ defaults.app_name }}-pg
    app.kubernetes.io/managed-by: kbcli
rules:
  - apiGroups:
      - '*'
    resources:
      - '*'
    verbs:
      - '*'
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ${{ defaults.app_name }}-pg
  labels:
    sealos-db-provider-cr: ${{ defaults.app_name }}-pg
    app.kubernetes.io/instance: ${{ defaults.app_name }}-pg
    app.kubernetes.io/managed-by: kbcli
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ${{ defaults.app_name }}-pg
subjects:
  - kind: ServiceAccount
    name: ${{ defaults.app_name }}-pg
---
apiVersion: apps.kubeblocks.io/v1alpha1
kind: Cluster
metadata:
  name: ${{ defaults.app_name }}-pg
  labels:
    kb.io/database: postgresql-14.8.0
    clusterdefinition.kubeblocks.io/name: postgresql
    clusterversion.kubeblocks.io/name: postgresql-14.8.0
    sealos-db-provider-cr: ${{ defaults.app_name }}-pg
spec:
  affinity:
    nodeLabels: {}
    podAntiAffinity: Preferred
    tenancy: SharedNode
    topologyKeys: []
  clusterDefinitionRef: postgresql
  clusterVersionRef: postgresql-14.8.0
  terminationPolicy: Delete
  componentSpecs:
    - name: postgresql
      componentDefRef: postgresql
      disableExporter: true
      enabledLogs:
        - running
      replicas: 1
      serviceAccountName: ${{ defaults.app_name }}-pg
      switchPolicy:
        type: Noop
      resources:
        limits:
          cpu: 500m
          memory: 512Mi
        requests:
          cpu: 50m
          memory: 51Mi
      volumeClaimTemplates:
        - name: data
          spec:
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 1Gi
            storageClassName: openebs-backup
  tolerations: []
---
apiVersion: batch/v1
kind: Job
metadata:
  name: ${{ defaults.app_name }}-pg-init
  labels:
    cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}-pg-init
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: OnFailure
      automountServiceAccountToken: false
      containers:
        - name: ${{ defaults.app_name }}-pg-init
          image: postgres:14.8-alpine
          imagePullPolicy: IfNotPresent
          env:
            - name: PG_HOST
              valueFrom:
                secretKeyRef:
                  name: ${{ defaults.app_name }}-pg-conn-credential
                  key: host
            - name: PG_PORT
              valueFrom:
                secretKeyRef:
                  name: ${{ defaults.app_name }}-pg-conn-credential
                  key: port
            - name: PG_USER
              valueFrom:
                secretKeyRef:
                  name: ${{ defaults.app_name }}-pg-conn-credential
                  key: username
            - name: PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ${{ defaults.app_name }}-pg-conn-credential
                  key: password
            - name: PG_DATABASE
              value: gauzy
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              export PGPASSWORD="$PG_PASSWORD"
              for i in $(seq 1 90); do
                if pg_isready -h "$PG_HOST" -p "$PG_PORT" -U "$PG_USER" -d postgres >/dev/null 2>&1; then
                  break
                fi
                sleep 2
              done
              pg_isready -h "$PG_HOST" -p "$PG_PORT" -U "$PG_USER" -d postgres >/dev/null 2>&1
              if ! psql -h "$PG_HOST" -p "$PG_PORT" -U "$PG_USER" -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname='$PG_DATABASE'" | grep -q 1; then
                psql -h "$PG_HOST" -p "$PG_PORT" -U "$PG_USER" -d postgres -v ON_ERROR_STOP=1 -c "CREATE DATABASE \"${PG_DATABASE}\";"
              fi
              psql -h "$PG_HOST" -p "$PG_PORT" -U "$PG_USER" -d "$PG_DATABASE" -v ON_ERROR_STOP=1 -c 'CREATE EXTENSION IF NOT EXISTS "uuid-ossp"; CREATE EXTENSION IF NOT EXISTS pgcrypto;'
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ${{ defaults.app_name }}-api
  annotations:
    originImageName: ghcr.io/ever-co/gauzy-api-demo:latest
    deploy.cloud.sealos.io/minReplicas: '1'
    deploy.cloud.sealos.io/maxReplicas: '1'
    docker-to-sealos.resource-override-source: Live Sealos cold-start validation on 2026-06-02 required 500m CPU and 768Mi memory for API migrations and demo seed startup.
  labels:
    cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}-api
    app: ${{ defaults.app_name }}-api
spec:
  replicas: 1
  revisionHistoryLimit: 1
  serviceName: ${{ defaults.app_name }}-api
  selector:
    matchLabels:
      app: ${{ defaults.app_name }}-api
  template:
    metadata:
      labels:
        app: ${{ defaults.app_name }}-api
    spec:
      automountServiceAccountToken: false
      initContainers:
        - name: prepare-public-dir
          image: busybox:1.36.1
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              mkdir -p /srv/gauzy/apps/api/public
              chown -R 1000:1000 /srv/gauzy/apps/api/public
          resources:
            limits:
              cpu: 200m
              memory: 256Mi
            requests:
              cpu: 20m
              memory: 25Mi
          volumeMounts:
            - name: vn-srvvn-gauzyvn-appsvn-apivn-public
              mountPath: /srv/gauzy/apps/api/public
        - name: wait-for-postgres
          image: postgres:14.8-alpine
          imagePullPolicy: IfNotPresent
          env:
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: ${{ defaults.app_name }}-pg-conn-credential
                  key: host
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: ${{ defaults.app_name }}-pg-conn-credential
                  key: port
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: ${{ defaults.app_name }}-pg-conn-credential
                  key: username
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: ${{ defaults.app_name }}-pg-conn-credential
                  key: password
            - name: DB_NAME
              value: gauzy
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              until psql -h "${DB_HOST}" -p "${DB_PORT}" -U "${DB_USER}" -d "${DB_NAME}" -tAc 'SELECT 1' >/dev/null 2>&1; do
                echo "waiting for Gauzy PostgreSQL database"
                sleep 2
              done
          resources:
            limits:
              cpu: 200m
              memory: 256Mi
            requests:
              cpu: 20m
              memory: 25Mi
      containers:
        - name: ${{ defaults.app_name }}-api
          image: ghcr.io/ever-co/gauzy-api-demo:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: NODE_OPTIONS
              value: --max-old-space-size=512
            - name: API_HOST
              value: 0.0.0.0
            - name: API_PORT
              value: '3000'
            - name: NODE_ENV
              value: development
            - name: DEMO
              value: 'true'
            - name: ADMIN_PASSWORD_RESET
              value: 'true'
            - name: LOG_LEVEL
              value: info
            - name: IS_DOCKER
              value: 'true'
            - name: ALLOW_SUPER_ADMIN_ROLE
              value: 'true'
            - name: APP_NAME
              value: Gauzy
            - name: APP_LOGO
              value: https://${{ defaults.app_host }}.${{ SEALOS_CLOUD_DOMAIN }}/assets/images/logos/logo_Gauzy.png
            - name: APP_SIGNATURE
              value: Gauzy
            - name: APP_LINK
              value: https://${{ defaults.app_host }}.${{ SEALOS_CLOUD_DOMAIN }}
            - name: APP_EMAIL_CONFIRMATION_URL
              value: https://${{ defaults.app_host }}.${{ SEALOS_CLOUD_DOMAIN }}/#/auth/confirm-email
            - name: APP_MAGIC_SIGN_URL
              value: https://${{ defaults.app_host }}.${{ SEALOS_CLOUD_DOMAIN }}/#/auth/magic-sign-in
            - name: API_BASE_URL
              value: https://${{ defaults.api_host }}.${{ SEALOS_CLOUD_DOMAIN }}
            - name: CLIENT_BASE_URL
              value: https://${{ defaults.app_host }}.${{ SEALOS_CLOUD_DOMAIN }}
            - name: ALLOWED_ORIGINS
              value: https://${{ defaults.app_host }}.${{ SEALOS_CLOUD_DOMAIN }},https://${{ defaults.api_host }}.${{ SEALOS_CLOUD_DOMAIN }}
            - name: PLATFORM_WEBSITE_URL
              value: https://gauzy.co
            - name: PLATFORM_WEBSITE_DOWNLOAD_URL
              value: https://gauzy.co/downloads
            - name: DB_ORM
              value: typeorm
            - name: DB_TYPE
              value: postgres
            - name: DB_SYNCHRONIZE
              value: 'false'
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: ${{ defaults.app_name }}-pg-conn-credential
                  key: host
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: ${{ defaults.app_name }}-pg-conn-credential
                  key: port
            - name: DB_NAME
              value: gauzy
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: ${{ defaults.app_name }}-pg-conn-credential
                  key: username
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: ${{ defaults.app_name }}-pg-conn-credential
                  key: password
            - name: DB_LOGGING
              value: error
            - name: DB_POOL_SIZE
              value: '10'
            - name: DB_POOL_SIZE_KNEX
              value: '5'
            - name: DB_CONNECTION_TIMEOUT
              value: '5000'
            - name: DB_IDLE_TIMEOUT
              value: '10000'
            - name: DB_SLOW_QUERY_LOGGING_TIMEOUT
              value: '10000'
            - name: DB_SSL_MODE
              value: 'false'
            - name: WORKER_DEFAULT_QUEUE
              value: gauzy_worker_default_queue
            - name: WORKER_QUEUE_ENABLED
              value: 'false'
            - name: WORKER_SCHEDULER_ENABLED
              value: 'false'
            - name: WORKER_TIMEZONE
              value: UTC
            - name: REDIS_ENABLED
              value: 'false'
            - name: REDIS_TLS
              value: 'false'
            - name: EXPRESS_SESSION_SECRET
              value: ${{ defaults.express_session_secret }}
            - name: JWT_SECRET
              value: ${{ defaults.jwt_secret }}
            - name: JWT_REFRESH_TOKEN_SECRET
              value: ${{ defaults.jwt_refresh_token_secret }}
            - name: JWT_REFRESH_TOKEN_EXPIRATION_TIME
              value: '86400'
            - name: JWT_VERIFICATION_TOKEN_SECRET
              value: ${{ defaults.jwt_verification_token_secret }}
            - name: JWT_VERIFICATION_TOKEN_EXPIRATION_TIME
              value: '86400'
            - name: MAGIC_CODE_EXPIRATION_TIME
              value: '600'
            - name: TEAM_JOIN_REQUEST_EXPIRATION_TIME
              value: '86400'
            - name: THROTTLE_ENABLED
              value: 'true'
            - name: THROTTLE_TTL
              value: '60000'
            - name: THROTTLE_LIMIT
              value: '60000'
            - name: GOOGLE_PLACE_AUTOCOMPLETE
              value: 'true'
            - name: DEFAULT_LATITUDE
              value: '42.6459136'
            - name: DEFAULT_LONGITUDE
              value: '23.3332736'
            - name: DEFAULT_CURRENCY
              value: USD
            - name: COMPANY_NAME
              value: Ever Co.
            - name: COMPANY_LINK
              value: https://ever.co
            - name: FILE_PROVIDER
              value: LOCAL
          ports:
            - containerPort: 3000
              name: http
              protocol: TCP
          startupProbe:
            httpGet:
              path: /api/health
              port: 3000
            failureThreshold: 90
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 12
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 120
            periodSeconds: 20
            failureThreshold: 6
            timeoutSeconds: 5
          volumeMounts:
            - name: vn-srvvn-gauzyvn-appsvn-apivn-public
              mountPath: /srv/gauzy/apps/api/public
          resources:
            limits:
              cpu: 500m
              memory: 768Mi
            requests:
              cpu: 50m
              memory: 76Mi
  volumeClaimTemplates:
    - metadata:
        name: vn-srvvn-gauzyvn-appsvn-apivn-public
        annotations:
          path: /srv/gauzy/apps/api/public
          value: '1'
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: ${{ defaults.app_name }}-api
  labels:
    app: ${{ defaults.app_name }}-api
    cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}-api
spec:
  selector:
    app: ${{ defaults.app_name }}-api
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ${{ defaults.app_name }}-api
  labels:
    cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}-api
    cloud.sealos.io/app-deploy-manager-domain: ${{ defaults.api_host }}
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: 32m
    nginx.ingress.kubernetes.io/server-snippet: 'client_header_buffer_size 64k;

      large_client_header_buffers 4 128k;'
    nginx.ingress.kubernetes.io/ssl-redirect: 'true'
    nginx.ingress.kubernetes.io/backend-protocol: HTTP
    nginx.ingress.kubernetes.io/client-body-buffer-size: 64k
    nginx.ingress.kubernetes.io/proxy-buffer-size: 64k
    nginx.ingress.kubernetes.io/proxy-send-timeout: '300'
    nginx.ingress.kubernetes.io/proxy-read-timeout: '300'
    nginx.ingress.kubernetes.io/configuration-snippet: |
      if ($request_uri ~* \.(js|css|gif|jpe?g|png)) {
        expires 30d;
        add_header Cache-Control "public";
      }
spec:
  rules:
    - host: ${{ defaults.api_host }}.${{ SEALOS_CLOUD_DOMAIN }}
      http:
        paths:
          - pathType: Prefix
            path: /
            backend:
              service:
                name: ${{ defaults.app_name }}-api
                port:
                  number: 3000
  tls:
    - hosts:
        - ${{ defaults.api_host }}.${{ SEALOS_CLOUD_DOMAIN }}
      secretName: ${{ SEALOS_CERT_SECRET_NAME }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${{ defaults.app_name }}-web
  annotations:
    originImageName: ghcr.io/ever-co/gauzy-webapp-demo:latest
    deploy.cloud.sealos.io/minReplicas: '1'
    deploy.cloud.sealos.io/maxReplicas: '1'
    docker-to-sealos.resource-override-source: Live Sealos cold-start validation on 2026-06-02 required 512Mi memory for the web container to avoid startup probe failures.
  labels:
    cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}-web
    app: ${{ defaults.app_name }}-web
spec:
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app: ${{ defaults.app_name }}-web
  template:
    metadata:
      labels:
        app: ${{ defaults.app_name }}-web
    spec:
      automountServiceAccountToken: false
      containers:
        - name: ${{ defaults.app_name }}-web
          image: ghcr.io/ever-co/gauzy-webapp-demo:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: DEMO
              value: 'true'
            - name: WEB_HOST
              value: 0.0.0.0
            - name: WEB_PORT
              value: '4200'
            - name: NODE_ENV
              value: production
            - name: API_HOST
              value: ${{ defaults.app_name }}-api
            - name: API_PORT
              value: '3000'
            - name: API_BASE_URL
              value: https://${{ defaults.api_host }}.${{ SEALOS_CLOUD_DOMAIN }}
            - name: CLIENT_BASE_URL
              value: https://${{ defaults.app_host }}.${{ SEALOS_CLOUD_DOMAIN }}
            - name: GOOGLE_PLACE_AUTOCOMPLETE
              value: 'true'
            - name: DEFAULT_LATITUDE
              value: '42.6459136'
            - name: DEFAULT_LONGITUDE
              value: '23.3332736'
            - name: DEFAULT_CURRENCY
              value: USD
            - name: FILE_PROVIDER
              value: LOCAL
            - name: DEMO_SUPER_ADMIN_EMAIL
              value: admin@ever.co
            - name: DEMO_SUPER_ADMIN_PASSWORD
              value: admin
            - name: DEMO_EMPLOYEE_EMAIL
              value: employee@ever.co
            - name: DEMO_EMPLOYEE_PASSWORD
              value: '12345678'
          ports:
            - containerPort: 4200
              name: http
              protocol: TCP
          startupProbe:
            httpGet:
              path: /
              port: 4200
            failureThreshold: 90
            periodSeconds: 5
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /
              port: 4200
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 6
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /
              port: 4200
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 6
            timeoutSeconds: 3
          resources:
            limits:
              cpu: 200m
              memory: 512Mi
            requests:
              cpu: 20m
              memory: 51Mi
---
apiVersion: v1
kind: Service
metadata:
  name: ${{ defaults.app_name }}-web
  labels:
    app: ${{ defaults.app_name }}-web
    cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}-web
spec:
  selector:
    app: ${{ defaults.app_name }}-web
  ports:
    - name: http
      port: 4200
      targetPort: 4200
      protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ${{ defaults.app_name }}-web
  labels:
    cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}-web
    cloud.sealos.io/app-deploy-manager-domain: ${{ defaults.app_host }}
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: 32m
    nginx.ingress.kubernetes.io/server-snippet: 'client_header_buffer_size 64k;

      large_client_header_buffers 4 128k;'
    nginx.ingress.kubernetes.io/ssl-redirect: 'true'
    nginx.ingress.kubernetes.io/backend-protocol: HTTP
    nginx.ingress.kubernetes.io/client-body-buffer-size: 64k
    nginx.ingress.kubernetes.io/proxy-buffer-size: 64k
    nginx.ingress.kubernetes.io/proxy-send-timeout: '300'
    nginx.ingress.kubernetes.io/proxy-read-timeout: '300'
    nginx.ingress.kubernetes.io/configuration-snippet: |
      if ($request_uri ~* \.(js|css|gif|jpe?g|png)) {
        expires 30d;
        add_header Cache-Control "public";
      }
spec:
  rules:
    - host: ${{ defaults.app_host }}.${{ SEALOS_CLOUD_DOMAIN }}
      http:
        paths:
          - pathType: Prefix
            path: /
            backend:
              service:
                name: ${{ defaults.app_name }}-web
                port:
                  number: 4200
  tls:
    - hosts:
        - ${{ defaults.app_host }}.${{ SEALOS_CLOUD_DOMAIN }}
      secretName: ${{ SEALOS_CERT_SECRET_NAME }}
---
apiVersion: app.sealos.io/v1
kind: App
metadata:
  name: ${{ defaults.app_name }}
  labels:
    cloud.sealos.io/app-deploy-manager: ${{ defaults.app_name }}
spec:
  data:
    url: https://${{ defaults.app_host }}.${{ SEALOS_CLOUD_DOMAIN }}
  displayType: normal
  icon: https://raw.githubusercontent.com/labring-sigs/templates/main/template/ever-gauzy/logo.png
  name: Ever Gauzy
  type: link
