        image: langgenius/dify-sandbox:0.2.14
        env:
        - name: API_KEY
          valueFrom:
            configMapKeyRef:
              name: "${{ defaults.app_name }}-shared-config"
              key: SANDBOX_API_KEY
        - name: GIN_MODE
          valueFrom:
            configMapKeyRef:
              name: "${{ defaults.app_name }}-shared-config"
              key: SANDBOX_GIN_MODE
        - name: WORKER_TIMEOUT
