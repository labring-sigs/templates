    app: "${{ defaults.app_name }}-worker-beat"
    cloud.sealos.io/app-deploy-manager: "${{ defaults.app_name }}-worker-beat"
  annotations:
    originImageName: langgenius/dify-api:1.13.3
    deploy.cloud.sealos.io/minReplicas: '1'
    deploy.cloud.sealos.io/maxReplicas: '1'
spec:
  replicas: 1
  revisionHistoryLimit: 1
  minReadySeconds: 10
  serviceName: "${{ defaults.app_name }}-worker-beat"
  selector:
    matchLabels:
      app: "${{ defaults.app_name }}-worker-beat"
  template:
    metadata:
      labels:
        app: "${{ defaults.app_name }}-worker-beat"
        cloud.sealos.io/app-deploy-manager: "${{ defaults.app_name }}-worker-beat"
    spec:
      nodeSelector:
        kubernetes.io/os: linux
      volumes:
      - name: "${{ defaults.app_name }}-api-storage"
        persistentVolumeClaim:
          claimName: "${{ defaults.app_name }}-api-storage"
      initContainers:
      - name: init-permissions
        image: busybox:1.37.0
        command:
        - sh
        - "-c"
        - |
          FLAG_FILE="/app/api/storage/.init_permissions"
          if [ -f "$FLAG_FILE" ]; then
            echo "Permissions already initialized. Exiting."
            exit 0
          fi
          echo "Initializing permissions for /app/api/storage"
          chown -R 1001:1001 /app/api/storage && touch "$FLAG_FILE"
          echo "Permissions initialized. Exiting."
        volumeMounts:
        - name: "${{ defaults.app_name }}-api-storage"
          mountPath: "/app/api/storage"
        imagePullPolicy: IfNotPresent
      containers:
      - name: "${{ defaults.app_name }}-worker-beat"
        image: langgenius/dify-api:1.13.3
        envFrom:
        - configMapRef:
            name: "${{ defaults.app_name }}-shared-config"
        env:
        - name: MODE
          value: beat
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 1000m
            memory: 2Gi
        ports:
        - containerPort: 5001
        imagePullPolicy: IfNotPresent
      automountServiceAccountToken: false
