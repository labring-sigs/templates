            cpu: "2000m"
          requests:
            memory: "256Mi"
            cpu: "500m"
        ports:
        - containerPort: 5003
          protocol: TCP
          name: debug-port

        - containerPort: 5002
          protocol: TCP
          name: service-port
        envFrom:
        - configMapRef:
