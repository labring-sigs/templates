apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: "${{ defaults.app_name }}-redis"
  labels:
    cloud.sealos.io/app-deploy-manager: "${{ defaults.app_name }}-redis"
    app: "${{ defaults.app_name }}-redis"
  annotations:
    originImageName: redis:6-alpine
    deploy.cloud.sealos.io/minReplicas: '1'
    deploy.cloud.sealos.io/maxReplicas: '1'
spec:
  selector:
    matchLabels:
      app: "${{ defaults.app_name }}-redis"
  serviceName: "${{ defaults.app_name }}-redis"
  replicas: 1
  template:
    metadata:
      labels:
        app: "${{ defaults.app_name }}-redis"
        cloud.sealos.io/app-deploy-manager: "${{ defaults.app_name }}-redis"
    spec:
      terminationGracePeriodSeconds: 10
      nodeSelector:
        kubernetes.io/os: linux
      serviceAccountName: "${{ defaults.app_name }}-redis"
      containers:
      - name: "${{ defaults.app_name }}-redis"
        image: redis:6-alpine
        ports:
        - containerPort: 6379
          name: redis-p
        command:
        - redis-server
        - "--save"
        - '20'
        - '1'
        - "--loglevel"
        - warning
        - "--requirepass"
        - "$(REDIS_PASSWORD)"
        resources:
          limits:
            cpu: 500m
            memory: 1024Mi
          requests:
            cpu: 100m
            memory: 102Mi
        env:
        - name: REDIS_PASSWORD
          valueFrom:
            configMapKeyRef:
              name: "${{ defaults.app_name }}-shared-config"
              key: REDIS_PASSWORD
        livenessProbe:
          exec:
            command:
            - redis-cli
            - ping
        volumeMounts:
        - name: redis-data
          mountPath: "/data"
        imagePullPolicy: IfNotPresent
      volumes:
      - name: redis-data
        persistentVolumeClaim:
          claimName: "${{ defaults.app_name }}-redis-data"
      automountServiceAccountToken: false
  revisionHistoryLimit: 1
---
