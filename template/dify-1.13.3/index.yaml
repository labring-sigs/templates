apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: "${{ defaults.app_name }}-api"
  labels:
    app.kubernetes.io/instance: "${{ defaults.app_name }}-api"
    app: "${{ defaults.app_name }}-api"
    cloud.sealos.io/app-deploy-manager: "${{ defaults.app_name }}-api"
  annotations:
    originImageName: langgenius/dify-api:1.13.3
    deploy.cloud.sealos.io/minReplicas: '1'
    deploy.cloud.sealos.io/maxReplicas: '1'
spec:
  replicas: 1
  revisionHistoryLimit: 1
  minReadySeconds: 10
  serviceName: "${{ defaults.app_name }}-api"
  selector:
    matchLabels:
      app: "${{ defaults.app_name }}-api"
  template:
    metadata:
      labels:
        app: "${{ defaults.app_name }}-api"
        cloud.sealos.io/app-deploy-manager: "${{ defaults.app_name }}-api"
    spec:
      nodeSelector:
        kubernetes.io/os: linux
      volumes:
      - name: "${{ defaults.app_name }}-api-storage"
        persistentVolumeClaim:
          claimName: "${{ defaults.app_name }}-api-storage"
      initContainers:
      - name: init-permissions
        image: busybox:1.37.0
        command:
        - sh
        - "-c"
        - |
          FLAG_FILE="/app/api/storage/.init_permissions"
          if [ -f "$FLAG_FILE" ]; then
            echo "Permissions already initialized. Exiting."
            exit 0
          fi
          echo "Initializing permissions for /app/api/storage"
          chown -R 1001:1001 /app/api/storage && touch "$FLAG_FILE"
          echo "Permissions initialized. Exiting."
        volumeMounts:
        - name: "${{ defaults.app_name }}-api-storage"
          mountPath: "/app/api/storage"
        imagePullPolicy: IfNotPresent
      containers:
      - name: "${{ defaults.app_name }}-api"
        image: langgenius/dify-api:1.13.3
        envFrom:
        - configMapRef:
            name: "${{ defaults.app_name }}-shared-config"
        env:
        - name: MODE
          value: api
        - name: SENTRY_DSN
          valueFrom:
            configMapKeyRef:
              name: "${{ defaults.app_name }}-shared-config"
              key: API_SENTRY_DSN
        - name: SENTRY_TRACES_SAMPLE_RATE
          valueFrom:
            configMapKeyRef:
              name: "${{ defaults.app_name }}-shared-config"
              key: API_SENTRY_TRACES_SAMPLE_RATE
        - name: SENTRY_PROFILES_SAMPLE_RATE
          valueFrom:
            configMapKeyRef:
              name: "${{ defaults.app_name }}-shared-config"
              key: API_SENTRY_PROFILES_SAMPLE_RATE
        - name: PLUGIN_MAX_PACKAGE_SIZE
          valueFrom:
            configMapKeyRef:
              name: "${{ defaults.app_name }}-shared-config"
              key: PLUGIN_MAX_PACKAGE_SIZE
        - name: INNER_API_KEY_FOR_PLUGIN
          valueFrom:
            configMapKeyRef:
              name: "${{ defaults.app_name }}-shared-config"
              key: PLUGIN_DIFY_INNER_API_KEY
        - name: PLUGIN_REMOTE_INSTALL_HOST
          valueFrom:
            configMapKeyRef:
              name: "${{ defaults.app_name }}-shared-config"
              key: EXPOSE_PLUGIN_DEBUGGING_HOST
        - name: PLUGIN_REMOTE_INSTALL_PORT
          valueFrom:
            configMapKeyRef:
              name: "${{ defaults.app_name }}-shared-config"
              key: EXPOSE_PLUGIN_DEBUGGING_PORT
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 1000m
            memory: 2Gi
        ports:
        - containerPort: 5001
        imagePullPolicy: IfNotPresent
        volumeMounts:
        - name: "${{ defaults.app_name }}-api-storage"
          mountPath: "/app/api/storage"
      automountServiceAccountToken: false
---
