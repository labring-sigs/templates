              name: "${{ defaults.app_name }}-shared-config"
              key: SANDBOX_WORKER_TIMEOUT
        - name: ENABLE_NETWORK
          valueFrom:
            configMapKeyRef:
              name: "${{ defaults.app_name }}-shared-config"
              key: SANDBOX_ENABLE_NETWORK
        - name: SANDBOX_PORT
          valueFrom:
            configMapKeyRef:
              name: "${{ defaults.app_name }}-shared-config"
