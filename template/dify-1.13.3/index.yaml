apiVersion: v1
kind: ServiceAccount
metadata:
  labels:
    app.kubernetes.io/instance: "${{ defaults.app_name }}-postgres"
    cloud.sealos.io/app-deploy-manager: "${{ defaults.app_name }}-postgres"
    app: "${{ defaults.app_name }}-postgres"
  name: "${{ defaults.app_name }}-postgres"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  labels:
    app.kubernetes.io/instance: "${{ defaults.app_name }}-postgres"
    cloud.sealos.io/app-deploy-manager: "${{ defaults.app_name }}-postgres"
    app: "${{ defaults.app_name }}-postgres"
  name: "${{ defaults.app_name }}-postgres"
rules:
- apiGroups:
  - "*"
  resources:
  - "*"
  verbs:
  - "*"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  labels:
    app.kubernetes.io/instance: "${{ defaults.app_name }}-postgres"
    cloud.sealos.io/app-deploy-manager: "${{ defaults.app_name }}-postgres"
    app: "${{ defaults.app_name }}-postgres"
  name: "${{ defaults.app_name }}-postgres"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: "${{ defaults.app_name }}-postgres"
subjects:
- kind: ServiceAccount
  name: "${{ defaults.app_name }}-postgres"
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: "${{ defaults.app_name }}-postgres"
  labels:
    cloud.sealos.io/app-deploy-manager: "${{ defaults.app_name }}-postgres"
    app: "${{ defaults.app_name }}-postgres"
  annotations:
    originImageName: postgres:15-alpine
    deploy.cloud.sealos.io/minReplicas: '1'
    deploy.cloud.sealos.io/maxReplicas: '1'
spec:
  selector:
    matchLabels:
      app: "${{ defaults.app_name }}-postgres"
  serviceName: "${{ defaults.app_name }}-postgres"
  replicas: 1
  template:
    metadata:
      labels:
        app: "${{ defaults.app_name }}-postgres"
        cloud.sealos.io/app-deploy-manager: "${{ defaults.app_name }}-postgres"
    spec:
      serviceAccountName: "${{ defaults.app_name }}-postgres"
      terminationGracePeriodSeconds: 10
      nodeSelector:
        kubernetes.io/os: linux
      containers:
      - name: "${{ defaults.app_name }}-postgres"
        image: postgres:15-alpine
        env:
        - name: PGUSER
          valueFrom:
            configMapKeyRef:
              name: "${{ defaults.app_name }}-shared-config"
              key: PGUSER
        - name: POSTGRES_PASSWORD
          valueFrom:
            configMapKeyRef:
              name: "${{ defaults.app_name }}-shared-config"
              key: POSTGRES_PASSWORD
        - name: POSTGRES_DB
          valueFrom:
            configMapKeyRef:
              name: "${{ defaults.app_name }}-shared-config"
              key: POSTGRES_DB
        - name: PGDATA
          valueFrom:
            configMapKeyRef:
              name: "${{ defaults.app_name }}-shared-config"
              key: PGDATA
        livenessProbe:
          exec:
            command:
            - pg_isready
            - "-U"
            - "$(PGUSER)"
            - "-d"
            - "$(POSTGRES_DB)"
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 2
          successThreshold: 1
          failureThreshold: 10
        resources:
          limits:
            cpu: 500m
            memory: 1Gi
          requests:
            cpu: 100m
            memory: 128Mi
        ports:
        - containerPort: 5432
          name: postgres-port
        volumeMounts:
        - name: postgres-data
          mountPath: "/var/lib/postgresql/data"
        imagePullPolicy: IfNotPresent
      volumes:
      - name: postgres-data
        persistentVolumeClaim:
          claimName: "${{ defaults.app_name }}-postgres-data"
      automountServiceAccountToken: false
  revisionHistoryLimit: 1
---
apiVersion: v1
kind: Service
metadata:
  name: "${{ defaults.app_name }}-postgres"
  labels:
    cloud.sealos.io/app-deploy-manager: "${{ defaults.app_name }}-postgres"
    app: "${{ defaults.app_name }}-postgres"
spec:
  selector:
    app: "${{ defaults.app_name }}-postgres"
  type: ClusterIP
  clusterIP: None
  ports:
  - name: postgres
    protocol: TCP
    port: 5432
    targetPort: 5432
---
