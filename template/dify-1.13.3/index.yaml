kind: Service
metadata:
  name: "${{ defaults.app_name }}-ssrf"
  labels:
    cloud.sealos.io/app-deploy-manager: "${{ defaults.app_name }}-ssrf"
    app: "${{ defaults.app_name }}-ssrf"
spec:
  selector:
