apiVersion: app.sealos.io/v1
kind: Template
metadata:
  name: dify
spec:
  title: Dify
  url: https://dify.ai
  gitRepo: https://github.com/langgenius/dify
  author: Sealos
  description: Dify is an open-source LLM application development platform with API,
    worker, web, plugin daemon, PostgreSQL, Redis, Weaviate, sandbox, SSRF proxy,
    and Nginx.
  readme: https://raw.githubusercontent.com/labring-sigs/templates/main/template/dify-1.13.3/README.md
  icon: https://raw.githubusercontent.com/labring-sigs/templates/main/template/dify-1.13.3/logo.svg
  screenshots:
  - https://raw.githubusercontent.com/labring-sigs/templates/main/template/dify-1.13.3/website-screenshot.webp
  templateType: inline
  locale: en
  categories:
  - ai
  - low-code
  i18n:
    zh:
      description: Dify 是开源的大模型应用开发平台，此模板包含 API、Worker、Web、插件服务、PostgreSQL、Redis、Weaviate、Sandbox、SSRF
        代理和 Nginx。
      readme: https://raw.githubusercontent.com/labring-sigs/templates/main/template/dify-1.13.3/README_zh.md
  defaults:
    app_name:
      type: string
      value: dify-${{ random(8) }}
    app_host:
      type: string
      value: "${{ random(8) }}"
  inputs:
    init_password:
      description: Initial password for the Dify console owner account
      type: string
      default: password
      required: true
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: "${{ defaults.app_name }}-postgres-data"
  labels:
    cloud.sealos.io/app-deploy-manager: "${{ defaults.app_name }}-postgres-data"
    app: "${{ defaults.app_name }}-postgres-data"
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: "${{ defaults.app_name }}-redis-data"
  labels:
    cloud.sealos.io/app-deploy-manager: "${{ defaults.app_name }}-redis-data"
    app: "${{ defaults.app_name }}-redis-data"
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: "${{ defaults.app_name }}-weaviate-data"
  labels:
    cloud.sealos.io/app-deploy-manager: "${{ defaults.app_name }}-weaviate-data"
