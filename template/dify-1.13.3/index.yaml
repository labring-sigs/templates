apiVersion: apps/v1
kind: Deployment
metadata:
  name: dify-plugin-daemon
  namespace: ns-38cq5qwz
  labels:
    app: dify-plugin-daemon
spec:
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app: dify-plugin-daemon
  template:
    metadata:
      labels:
        app: dify-plugin-daemon
    spec:
      nodeSelector:
        kubernetes.io/os: linux
      automountServiceAccountToken: false
      volumes:
      - name: dify-plugin-daemon-storage
        persistentVolumeClaim:
          claimName: dify-plugin-daemon-storage
      initContainers:
      - name: wait-for-postgres
        image: postgres:15-alpine
        command: [ 'sh', '-c', 'until pg_isready -h dify-postgres -U postgres -d dify; do echo waiting for postgres; sleep 2; done;' ]
